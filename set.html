<!DOCTYPE html>
<html lang="nl">
<head>

<script>
let jsPDFReady = false;
let jsPDFCheckInterval = setInterval(function() {
  if (window.jsPDF && window.jsPDF.jsPDF) {
    jsPDFReady = true;
    clearInterval(jsPDFCheckInterval);
  }
}, 100);
setTimeout(() => { if (jsPDFCheckInterval) clearInterval(jsPDFCheckInterval); }, 10000);
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-grad:linear-gradient(160deg,#f0eef9 0%,#ddd8f0 50%,#cfc8e8 100%);
  --glass:rgba(255,255,255,0.90);
  --glass-border:rgba(200,195,230,0.6);
  --glass-shadow:0 4px 24px rgba(80,60,160,0.10),inset 1px 1px 0 rgba(255,255,255,1);
  --glass-shadow-lg:0 8px 40px rgba(80,60,160,0.14),inset 1px 1px 0 rgba(255,255,255,1);
  --text:#0b0f2a;--text2:#3d3a55;--text3:#7c7899;
  --accent:#0062ff;--accent2:#0075ff;--accent-light:rgba(0,98,255,0.12);
  --green:#18b672;--green-light:rgba(24,182,114,0.15);
  --red:#e83a4a;--red-light:rgba(232,58,74,0.12);
  --orange:#f07b20;
  --r:20px;--r2:28px;--r3:14px;--r4:10px;
  --font:'DM Sans',sans-serif;
  --ease:cubic-bezier(0,0,.47,1.15);
  --ease2:cubic-bezier(0.34,1.56,0.64,1);
}
html{min-height:100vh;font-family:var(--font);color:var(--text);font-size:16px;overflow-x:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
body{min-height:100vh;background:var(--bg-grad);background-attachment:fixed;-webkit-touch-callout:none;-webkit-user-select:none;}

body.dark-mode nav,
body.dark-mode .mode-card, body.dark-mode .term-item, body.dark-mode .st-qbox, body.dark-mode .stat-box, body.dark-mode .mc-option, body.dark-mode .exam-info, body.dark-mode .checkpoint-panel {
  background: var(--glass) !important;
  border-color: var(--glass-border) !important;
  color: var(--text) !important;
}
body.dark-mode .fc-face { background: rgba(40, 40, 60, 0.95) !important; border-color: var(--glass-border) !important; color: #fff !important; }
body.dark-mode .fc-face-back { background: rgba(45, 50, 70, 0.95) !important; border-color: var(--glass-border) !important; color: #fff !important; }
body.dark-mode input, body.dark-mode textarea, body.dark-mode select {
  background: rgba(50, 50, 70, 0.8) !important; border-color: var(--glass-border) !important; color: var(--text) !important;
}
body.dark-mode input:focus, body.dark-mode textarea:focus, body.dark-mode select:focus {
  background: rgba(60, 60, 80, 0.9) !important; border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px rgba(0,98,255,0.12), inset 1px 1px 0 rgba(88,93,120,0.5) !important;
}
body.dark-mode .btn-glass {
  background: rgba(50, 50, 70, 0.7) !important; color: var(--text) !important;
  border-color: var(--glass-border) !important;
  box-shadow: inset 1px 1px 0 rgba(88,93,120,0.5), 0 2px 8px rgba(0,0,0,0.4) !important;
}
body.dark-mode .btn-glass:hover {
  background: rgba(60, 60, 80, 0.8) !important;
  box-shadow: inset 1px 1px 0 rgba(100,110,140,0.6), 0 4px 12px rgba(0,0,0,0.5) !important;
}
body.dark-mode .btn-icon {
  background: rgba(50, 50, 70, 0.7) !important; color: var(--text) !important;
  box-shadow: inset 1px 1px 0 rgba(88,93,120,0.5), 0 2px 8px rgba(0,0,0,0.4) !important;
}
body.dark-mode .btn-icon:hover {
  background: rgba(60, 60, 80, 0.8) !important;
  box-shadow: inset 1px 1px 0 rgba(100,110,140,0.6), 0 4px 12px rgba(0,0,0,0.5) !important;
}
body.dark-mode .settings-dropdown { background: var(--glass) !important; border-color: var(--glass-border) !important; color: var(--text) !important; }
body.dark-mode .settings-select { background: rgba(50, 50, 70, 0.8) !important; border-color: var(--glass-border) !important; color: var(--text) !important; }
body.dark-mode #modal-panel { background: var(--glass) !important; border-color: var(--glass-border) !important; color: var(--text) !important; }
body.dark-mode #modal-panel input, body.dark-mode #modal-panel textarea {
  background: rgba(50, 50, 70, 0.8) !important; border-color: var(--glass-border) !important; color: var(--text) !important;
}
body.dark-mode #toast { background: var(--glass) !important; border-color: var(--glass-border) !important; color: var(--text) !important; }
body.dark-mode .milestone-panel { background: var(--glass) !important; border-color: var(--glass-border) !important; color: var(--text) !important; }
body.dark-mode .results-overlay { background: var(--glass) !important; border-color: var(--glass-border) !important; color: var(--text) !important; }
body.dark-mode input,textarea,select{background:rgba(50,50,70,0.8) !important;border-color:var(--glass-border) !important;color:var(--text) !important;box-shadow: inset 1px 1px 0 rgba(100,110,140,0.6), 0 4px 12px rgba(0,0,0,0.5) !important;}
body.dark-mode .combine-set-item { background: rgba(40,40,60,0.7) !important; border-color: var(--glass-border) !important; color: var(--text) !important; }
body.dark-mode .combine-set-item.selected { background: rgba(0,98,255,0.18) !important; border-color: var(--accent) !important; }

nav{
  position:sticky;top:0;z-index:200;
  background:rgba(240,238,249,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(200,195,230,0.5);
  padding: env(safe-area-inset-top, 0px) 28px 0;
  height: calc(72px + env(safe-area-inset-top, 0px));
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{max-height: 50px; height: 100%;width:auto;display:flex;align-items:center;gap:8px;}
.nav-logo-svg {height:80%;width:auto;display:block;}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--r3);cursor:pointer;font-family:var(--font);font-size:14px;font-weight:700;padding:9px 18px;transition:all .2s var(--ease);outline:none;white-space:nowrap;}
.btn-primary{background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;box-shadow:0 2px 12px rgba(0,98,255,0.35),inset 1px 1px 0 rgba(255,255,255,0.25);}
.btn-primary:hover{filter:brightness(1.15);transform:scale(1.04) translateY(-1px)}
.btn-glass{background:linear-gradient(180deg,rgba(255,255,255,0.9) 0%,rgba(255,255,255,0.75) 100%);color:var(--text);box-shadow:inset 1px 1px 0 rgba(255,255,255,1),0 2px 8px rgba(80,60,160,0.1);border:none;}
.btn-glass:hover{background:rgba(255,255,255,0.95);transform:scale(1.04)}
.btn-primary:active,.btn-glass:active{transform:scale(0.97)}
.btn-green{background:linear-gradient(180deg,var(--green) 0%,rgba(24,182,114,0.85) 100%);color:#fff;box-shadow:0 2px 12px rgba(24,182,114,0.35)}
.btn-green:hover{filter:brightness(1.15);transform:scale(1.04)}
.btn-red{background:linear-gradient(180deg,var(--red) 0%,rgba(232,58,74,0.85) 100%);color:#fff;box-shadow:0 2px 12px rgba(232,58,74,0.3)}
.btn-red:hover{filter:brightness(1.15);transform:scale(1.04)}
.btn-lg{padding:13px 26px;font-size:16px;border-radius:var(--r)}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:var(--r4)}
.btn-icon{width:40px;height:40px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(255,255,255,0.9) 0%,rgba(255,255,255,0.75) 100%);box-shadow:inset 1px 1px 0 rgba(255,255,255,1),0 2px 8px rgba(80,60,160,0.1);border:none;border-radius:12px;cursor:pointer;}
.btn-icon:hover{background:rgba(255,255,255,0.95);transform:scale(1.08)}
input,textarea,select{background:rgba(255,255,255,0.85);border:1px solid rgba(200,195,230,0.6);border-radius:var(--r3);color:var(--text);font-family:var(--font);font-size:15px;padding:11px 16px;outline:none;transition:all .2s;width:100%;box-shadow:inset 1px 1px 0 rgba(255,255,255,1),0 2px 6px rgba(80,60,160,0.06);-webkit-appearance:none;appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);background:var(--glass);box-shadow:0 0 0 3px var(--accent-light),inset 1px 1px 0 rgba(255,255,255,1);}
.toggle{position:relative;width:46px;height:26px;cursor:pointer;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:rgba(180,170,210,0.5);border-radius:13px;transition:.25s;}
.toggle-slider::after{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.25s var(--ease2);box-shadow:0 2px 6px rgba(80,60,160,0.2);}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::after{transform:translateX(20px)}
#app{min-height:100vh;display:flex;flex-direction:column}
.screen{flex:1;padding:28px 32px;max-width:1100px;margin:0 auto;width:100%}
@keyframes pageIn{from{opacity:0;transform:scale(0.94) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes iosOpen{from{opacity:0;transform:scale(0.6) translateY(40px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardLeft{from{opacity:0;transform:translateX(60px) scale(0.96)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fbIn{from{opacity:0;transform:scale(0.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:var(--font);font-size:14px;font-weight:700;color:var(--text2);padding:6px 0;margin-bottom:20px;transition:color .15s}
.back-btn:hover{color:var(--text)}
.set-detail-title{font-size:34px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.mode-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r2);padding:22px 18px;cursor:pointer;text-align:center;box-shadow:var(--glass-shadow);transition:all .2s var(--ease);}
.mode-card:hover{transform:translateY(-4px) scale(1.04);box-shadow:var(--glass-shadow-lg);background:rgba(255,255,255,0.98)}
.mode-card:active{transform:scale(0.97)}
.mode-card-icon{font-size:30px;margin-bottom:10px}
.mode-card-title{font-weight:800;font-size:16px;margin-bottom:3px}
.mode-card-desc{font-size:12px;color:var(--text2)}
.terms-list{display:flex;flex-direction:column;gap:8px}
.term-item{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:16px 20px;box-shadow:var(--glass-shadow);display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;}
.term-divider{width:1px;min-height:24px;background:rgba(66,85,255,0.2);align-self:stretch}
.term-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:700}
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700}
.badge-purple{background:var(--accent-light);color:var(--accent)}
.badge-orange{background:rgba(240,123,32,0.12);color:var(--orange)}
.badge-gray{background:rgba(120,110,150,0.12);color:var(--text2)}
.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.progress-track{flex:1;height:8px;background:rgba(180,170,210,0.25);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .5s var(--ease)}
.streak-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;background:var(--glass);border:2px solid var(--glass-border);box-shadow:var(--glass-shadow);position:relative;transition:all .3s var(--ease2);color:var(--text2);}
.streak-circle.on-fire{background:linear-gradient(135deg,#ffe5c0,#ffcb87);border-color:rgba(255,160,50,0.7);box-shadow:0 0 18px rgba(255,120,30,0.35),0 4px 12px rgba(255,120,30,0.2);animation:pulseFlame 1.5s ease-in-out infinite;color:transparent;}
.streak-circle.on-fire .streak-num{display:none}
.streak-circle.on-fire svg.flame-icon{display:block}
svg.flame-icon{width:22px;height:22px;display:none}
.flame-icon .f1{fill:#ff9d00;animation:flicker 0.6s infinite alternate}
.flame-icon .f2{fill:#ff5e00;animation:flicker 0.4s infinite alternate-reverse}
@keyframes pulseFlame{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes flicker{from{opacity:0.8;transform:scale(0.95) translateY(1px)}to{opacity:1;transform:scale(1.05) translateY(-1px)}}
.fc-wrap{max-width:620px;margin:0 auto;position:relative}
.fc-card-scene{perspective:1400px;height:300px;cursor:pointer;margin-bottom:20px;user-select:none}
.fc-card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.fc-card-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:#f6f4ff;border:1.5px solid rgba(200,195,230,0.7);border-radius:var(--r2);box-shadow:var(--glass-shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px;text-align:center;}
.fc-face-back{transform:rotateY(180deg);background:#eef4ff;}
.fc-mark-right{transform:translate(140%,-10%) rotate(35deg)!important;opacity:0!important;transition:all 0.5s ease-in!important;}
.fc-mark-wrong{transform:translate(-140%,-10%) rotate(-35deg)!important;opacity:0!important;transition:all 0.5s ease-in!important;}
.fc-face-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:14px}
.fc-face-text{font-size:24px;font-weight:800;line-height:1.3;letter-spacing:-0.3px}
.st-wrap{max-width:600px;margin:0 auto;position:relative}
.st-qbox{background:var(--glass);border:1.5px solid var(--glass-border);border-radius:var(--r2);padding:32px;text-align:center;box-shadow:var(--glass-shadow-lg);margin-bottom:20px;}
.st-qlabel{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:12px}
.st-qtext{font-size:22px;font-weight:800;line-height:1.3;letter-spacing:-0.3px}
.st-feedback{padding:14px;border-radius:var(--r);text-align:center;font-weight:700;margin-bottom:14px;animation:fbIn .25s var(--ease2);font-size:15px;}
.fb-correct{background:rgba(24,182,114,0.18);color:var(--green);border:1px solid rgba(24,182,114,0.4)}
.fb-wrong{background:rgba(232,58,74,0.14);color:var(--red);border:1px solid rgba(232,58,74,0.3)}
.fb-override-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid rgba(24,182,114,0.4);border-radius:8px;padding:5px 12px;font-family:var(--font);font-size:13px;font-weight:700;color:var(--green);cursor:pointer;margin-top:8px;transition:all .15s;}
.fb-override-btn:hover{background:var(--green-light)}
.st-hint-btn{background:none;border:1px dashed var(--accent-light);border-radius:8px;padding:6px 14px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;transition:all .15s;}
.st-hint-btn:hover{background:var(--accent-light)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-box{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--glass-shadow);}
.stat-num{font-size:26px;font-weight:800;line-height:1}
.stat-label{font-size:12px;color:var(--text2);margin-top:3px;font-weight:600}
.stat-green{color:var(--green)}.stat-red{color:var(--red)}.stat-blue{color:var(--accent)}
.mc-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.mc-option{background:var(--glass);border:1.5px solid var(--glass-border);border-radius:var(--r);padding:14px 18px;cursor:pointer;transition:all .15s;font-size:15px;font-weight:600;display:flex;gap:12px;align-items:center;box-shadow:var(--glass-shadow);text-align:left;color:var(--text);font-family:var(--font);}
.mc-option:hover:not(.disabled):not(.sel-correct):not(.sel-wrong){background:rgba(255,255,255,0.95);transform:translateY(-2px);box-shadow:var(--glass-shadow-lg)}
.mc-option.sel-correct{background:rgba(24,182,114,0.18)!important;border-color:var(--green)!important;color:var(--green)!important}
.mc-option.sel-wrong{background:rgba(232,58,74,0.15)!important;border-color:var(--red)!important;color:var(--red)!important}
.mc-option.reveal{background:rgba(24,182,114,0.1)!important;border-color:rgba(24,182,114,0.5)!important;color:var(--green)!important}
.mc-letter{width:30px;height:30px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.exam-info{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;box-shadow:var(--glass-shadow);display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);font-weight:600;}
.exam-review-item{border-radius:var(--r);padding:14px;margin-bottom:8px;}
.exam-review-correct{background:rgba(24,182,114,0.12);border:1px solid rgba(24,182,114,0.25)}
.exam-review-wrong{background:rgba(232,58,74,0.10);border:1px solid rgba(232,58,74,0.2)}
.checkpoint-overlay{position:fixed;inset:0;z-index:5000;background:rgba(220,215,240,0.75);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s;}
.checkpoint-panel{background:rgba(252,250,255,0.99);border:1.5px solid rgba(200,195,230,0.8);border-radius:var(--r2);padding:32px;width:90%;max-width:560px;box-shadow:0 16px 64px rgba(80,60,160,0.2);animation:slideUp .4s var(--ease2);max-height:90vh;overflow-y:auto;}
.cp-term{border-radius:var(--r);padding:12px 14px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.cp-term.unknown{background:rgba(232,58,74,0.12);color:var(--red);border:1px solid rgba(232,58,74,0.25)}
.cp-mistake-list{max-height:180px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;padding:8px;border:1px solid rgba(200,195,230,0.3);border-radius:var(--r3)}
.btn-timer-fill{position:absolute;inset:0;background:rgba(255,255,255,0.2);width:0;animation:btnTimerProgress 10s linear forwards;pointer-events:none;border-radius:inherit;}
@keyframes btnTimerProgress{to{width:100%}}
#milestone-overlay{position:fixed;inset:0;z-index:9000;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;}
#milestone-overlay.active{opacity:1;pointer-events:auto}
.milestone-panel{background:rgba(255,255,255,0.98);border:1.5px solid rgba(200,195,230,0.8);border-radius:var(--r2);padding:36px 48px;box-shadow:0 20px 80px rgba(80,60,160,0.25);text-align:center;animation:msIn .4s var(--ease2);}
@keyframes msIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
.milestone-num{font-size:64px;font-weight:800;line-height:1;color:var(--accent);margin-bottom:4px}
.milestone-text{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.settings-dropdown-wrap{position:relative}
.settings-dropdown{position:absolute;top:calc(100% + 8px);right:0;z-index:500;background:rgba(252,251,255,0.99);border:1px solid rgba(200,195,230,0.7);border-radius:var(--r2);padding:16px;box-shadow:0 12px 48px rgba(80,60,160,0.18);width:280px;transform-origin:top right;animation:dropIn .25s var(--ease2) both;}
@keyframes dropIn{from{opacity:0;transform:scale(0.88) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.settings-section{margin-bottom:12px}.settings-section:last-child{margin-bottom:0}
.settings-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;padding:0 2px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:6px 2px;border-bottom:1px solid rgba(180,170,210,0.2)}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:14px;font-weight:600;color:var(--text)}
.settings-select{background:rgba(255,255,255,0.9);border:1px solid rgba(200,195,225,0.6);border-radius:8px;padding:5px 10px;font-size:13px;font-weight:600;color:var(--text);font-family:var(--font);outline:none;cursor:pointer;width:auto;}
.results-overlay{position:absolute;inset:0;z-index:10;background:rgba(248,246,255,0.99);border-radius:var(--r2);display:none;flex-direction:column;align-items:center;justify-content:center;padding:36px;text-align:center;animation:slideUp .4s var(--ease2)}
.results-pct{font-size:72px;font-weight:800;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wrong-item{border-radius:var(--r);padding:12px 16px;margin-bottom:6px;background:rgba(232,58,74,0.1);border:1px solid rgba(232,58,74,0.2)}
.encourage{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);z-index:8999;pointer-events:none;font-size:22px;font-weight:800;color:var(--accent);text-shadow:0 2px 12px rgba(0,98,255,0.3);animation:encourageAnim .9s var(--ease2) both;}
@keyframes encourageAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(0.7)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-60%) scale(0.95)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center}
.loading-spinner{width:48px;height:48px;border:4px solid var(--accent-light);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(252,250,255,0.99);border:1px solid rgba(200,195,230,0.7);border-radius:var(--r);padding:12px 20px;font-size:14px;font-weight:700;box-shadow:0 8px 32px rgba(80,60,160,0.2);opacity:0;transform:translateY(12px);pointer-events:none;transition:all .25s var(--ease2);}
#toast.show{opacity:1;transform:translateY(0)}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-hdr h3{font-size:20px;font-weight:800;letter-spacing:-0.3px}
.shake-anim{animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.copy-inp-correct{border-color:var(--green)!important;background:rgba(24,182,114,0.08)!important;box-shadow:0 0 0 3px rgba(24,182,114,0.18)!important;}

/* ── COMBINE MODAL ── */
.combine-search{width:100%;padding:10px 14px;border:1px solid var(--glass-border);border-radius:var(--r3);font-family:var(--font);font-size:14px;margin-bottom:12px;background:rgba(255,255,255,0.85);}
.combine-sets-list{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.combine-set-item{background:rgba(255,255,255,0.7);border:1.5px solid var(--glass-border);border-radius:var(--r3);padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;user-select:none;}
.combine-set-item:hover{background:rgba(255,255,255,0.95);border-color:var(--accent);}
.combine-set-item.selected{background:var(--accent-light);border-color:var(--accent);}
.combine-set-item.disabled{opacity:0.45;pointer-events:none;}
.combine-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--glass-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:rgba(255,255,255,0.6);}
.combine-set-item.selected .combine-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.combine-set-title{font-size:14px;font-weight:700;color:var(--text)}
.combine-set-meta{font-size:12px;color:var(--text3);margin-top:2px}

@media(max-width:640px){nav{padding:0 16px}.screen{padding:16px}.mode-grid{grid-template-columns:1fr}.nav-set-title{display:none}}

<script>
const _k=['S','t','u','d','y','D','e','c','k','V','S','e','t','2','0','2','5'];
const VSET_KEY=_k.join('');
function xorStr(str,key){return str.split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^key.charCodeAt(i%key.length))).join('');}
function decodeVset(b64){const xored=decodeURIComponent(escape(atob(b64.trim())));return JSON.parse(xorStr(xored,VSET_KEY));}

/* ── THEME LOADING ── */
function loadThemeSettings(){
  try{
    const saved=JSON.parse(localStorage.getItem('sd_theme')||'null');
    if(saved){
      const root=document.documentElement.style;
      const body=document.body;
      if(saved.darkMode){
        body.classList.add('dark-mode');
        root.setProperty('--bg-grad','linear-gradient(180deg, rgb(10, 10, 10) 0%, rgb(10, 8, 18) 100%)');
        root.setProperty('--glass','rgb(34, 33, 41)');
        root.setProperty('--glass2','rgba(34,33,41,0.90)');
        root.setProperty('--text','#ffffff');
        root.setProperty('--text2','#e9e9e9');
        root.setProperty('--text3','rgba(255,255,255,0.65)');
        root.setProperty('--glass-border','rgba(64,73,112,0.557)');
        root.setProperty('--glass-shadow','0 0px 10px rgba(0,5,48,0.8), inset 1px 1px 0 rgba(88,93,120,0.9)');
        root.setProperty('--glass-shadow-lg','0 8px 32px rgba(0,5,48,0.8), inset 1px 1px 0 rgba(88,93,120,0.9)');
      }
      if(saved.accentColor&&saved.accentColor!=='#0062ff'){
        root.setProperty('--accent',saved.accentColor);
        const hex=saved.accentColor.replace('#','');
        const r=parseInt(hex.substr(0,2),16);
        const g=parseInt(hex.substr(2,2),16);
        const b=parseInt(hex.substr(4,2),16);
        root.setProperty('--accent2',`rgb(${Math.max(0,r-20)},${Math.max(0,g-20)},${Math.max(0,b-20)})`);
        root.setProperty('--accent-light',`rgba(${r},${g},${b},0.12)`);
      }else{
        root.setProperty('--accent','#0062ff');
        root.setProperty('--accent2','#0075ff');
        root.setProperty('--accent-light','rgba(0,98,255,0.12)');
      }
    }
  }catch(e){console.error('Theme load error:',e);}
}

/* ── DROPDOWN TOGGLE ── */
function toggleDD(id){
  const el=document.getElementById(id);
  if(!el)return;
  const isOpen=el.style.display==='block';
  document.querySelectorAll('[id$="-menu"]').forEach(d=>{d.style.display='none';});
  if(!isOpen)el.style.display='block';
}
document.addEventListener('click',(e)=>{
  if(e.target.closest('.settings-dropdown-wrap'))return;
  document.querySelectorAll('[id$="-menu"]').forEach(dd=>{dd.style.display='none';});
});

let SET=null,currentMode='home';

/* ── LOAD SETS FROM /sets/ ── */
async function loadServerSets(){
  try{
    const baseURL=window.location.protocol==='file:'?'./sets/':'./sets/';
    const controller=new AbortController();
    const timeoutId=setTimeout(()=>controller.abort(),3000);
    const indexResp=await fetch(baseURL+'index.json',{signal:controller.signal});
    clearTimeout(timeoutId);
    if(indexResp.ok){
      const fileList=await indexResp.json();
      const serverSets={};
      for(const filename of fileList){
        try{
          let filePath=baseURL+filename;
          if(window.location.protocol==='file:') filePath=baseURL+encodeURIComponent(filename);
          const sr=await fetch(filePath);
          if(sr.ok){
            const content=await sr.text();
            let set=null;
            try{set=decodeVset(content.trim());}catch{try{set=JSON.parse(content.trim());}catch(e){}}
            if(set&&set.title){
              set.slug=set.slug||toSlug(set.title);
              serverSets[set.slug.toLowerCase()]=set;
            }
          }
        }catch(e){}
      }
      return serverSets;
    }
  }catch(e){}
  return {};
}

async function boot(){
  loadThemeSettings();
  const params=new URLSearchParams(window.location.search);
  const slug=params.get('set');
  if(!slug){showError('Geen set opgegeven. Ga terug naar de <a href="index.html">startpagina</a>.');return;}
  const slugLower=slug.toLowerCase();

  const stored=JSON.parse(localStorage.getItem('sd_sets')||'[]');
  for(let s of stored){
    if((s.slug&&s.slug.toLowerCase()===slugLower)||(s.id&&s.id===slug)||(s.title&&toSlug(s.title)===slugLower)){
      SET=s;renderSetView();return;
    }
  }

  try{
    const baseURL=window.location.protocol==='file:'?'./sets/':'./sets/';
    let filePath=baseURL+slug+'.vset';
    if(window.location.protocol==='file:') filePath=baseURL+encodeURIComponent(slug+'.vset');
    const controller=new AbortController();
    const timeoutId=setTimeout(()=>controller.abort(),2000);
    const resp=await fetch(filePath,{signal:controller.signal});
    clearTimeout(timeoutId);
    if(resp.ok){
      const raw=await resp.text();
      try{SET=decodeVset(raw);}catch{SET=JSON.parse(raw);}
      SET.slug=slug;renderSetView();return;
    }
  }catch(e){}

  const serverSets=await loadServerSets();
  if(serverSets[slugLower]){SET=serverSets[slugLower];renderSetView();return;}
  showError(`Set "<strong>${esc(slug)}</strong>" niet gevonden.<br><a href="index.html">← Terug naar home</a>`);
}
function showError(msg){document.getElementById('loading').innerHTML=`<div style="font-size:48px;margin-bottom:16px">😕</div><div style="font-size:20px;font-weight:800;margin-bottom:12px">Set niet gevonden</div><p style="color:var(--text2);max-width:400px;line-height:1.6">${msg}</p><a href="index.html" class="btn btn-primary" style="margin-top:24px;text-decoration:none">← Terug naar home</a>`;}
function toSlug(str){return str.toLowerCase().replace(/[àáâäãåā]/g,'a').replace(/[èéêëē]/g,'e').replace(/[ìíîïī]/g,'i').replace(/[òóôöõøō]/g,'o').replace(/[ùúûüū]/g,'u').replace(/[ñ]/g,'n').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').replace(/-+/g,'-').slice(0,60)||'set';}

function isLocalSet(s){
  return s && !s.fromServer && !s._serverFile;
}

function startMode(mode){
  currentMode=mode;
  const el=document.getElementById('main-screen');
  el.style.animation='none';el.offsetHeight;el.style.animation='iosOpen .45s cubic-bezier(0.34,1.3,0.64,1) both';
  if(mode==='flashcards')renderFlashcards();

}
function backToSet(){

}

/* ── HELPERS ── */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escA(s){return esc(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');}
function renderTerm(t,type='term'){
  const html=type==='term'?t.termHtml:t.defHtml;if(html)return html;
  const segments=type==='term'?t.termSegments:t.defSegments;
  const text=type==='term'?t.term:t.def;
  if(segments&&segments.length){return segments.map(s=>{if(!s.text)return'';const style=`${s.color?`color:${s.color};`:''}${s.bold?'font-weight:700;':''}${s.italic?'font-style:italic;':''}`;return style?`<span style="${style}">${esc(s.text)}</span>`:esc(s.text);}).join('');}
  return esc(text);
}
function renderImages(t){
  if(!t.images||!t.images.length)return'';
  return`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${t.images.map(img=>`<img src="data:image/png;base64,${img.base64}" style="max-width:120px;max-height:120px;border-radius:6px;object-fit:cover">`).join('')}</div>`;
}
function lev(a,b){const m=a.length,n=b.length;const d=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);return d[m][n];}
function checkAns(inp,correct,level=2){
  if(level===3)return inp.trim()===correct.trim();
  const clean=s=>s.toLowerCase().trim().replace(/[.,;:!?]/g,'').replace(/\s+/g,' ');
  const a=clean(inp),b=clean(correct);
  if(level===1){const parts=correct.split(/[,;]/).map(clean);if(parts.some(p=>a===p||(p.length>3&&lev(a,p)<=Math.max(1,Math.floor(p.length*0.25)))))return true;}
  if(a===b)return true;
  const maxDist=level===1?Math.floor(b.length*0.25):Math.floor(b.length*0.12);
  return lev(a,b)<=Math.max(1,maxDist);
}
function streakCircleHTML(id,streak){
  const f=streak>=3;
  return`<div class="streak-circle${f?' on-fire':''}" id="${id}"><span class="streak-num">${streak||0}</span><svg class="flame-icon" viewBox="0 0 24 24" fill="none"><path class="f1" d="M12 2C12 2 18 8 18 13C18 16.31 15.31 19 12 19C8.69 19 6 16.31 6 13C6 8 12 2 12 2Z"/><path class="f2" d="M12 7C12 7 15 11 15 14C15 15.66 13.66 17 12 17C10.34 17 9 15.66 9 14C9 11 12 7 12 7Z"/></svg></div>`;
}
function updateStreakCircle(id,streak){const el=document.getElementById(id);if(!el)return;el.className='streak-circle'+(streak>=3?' on-fire':'');const n=el.querySelector('.streak-num');if(n)n.textContent=streak||0;}

function fcUpdate(){const t=FC.terms[FC.idx];if(!t)return;const fi=FC.front==='term';document.getElementById('fc-fl').textContent=fi?'Begrip':'Definitie';document.getElementById('fc-ft').innerHTML=fi?renderTerm(t,'term')+renderImages(t):renderTerm(t,'def');document.getElementById('fc-bl').textContent=fi?'Definitie':'Begrip';document.getElementById('fc-bt').innerHTML=fi?renderTerm(t,'def'):renderTerm(t,'term')+renderImages(t);document.getElementById('fc-inner').classList.remove('flipped');FC.flipped=false;document.getElementById('fc-prog').style.width=Math.round((FC.idx/FC.terms.length)*100)+'%';document.getElementById('fc-ctr').textContent=`${FC.idx+1} / ${FC.terms.length}`;updateStreakCircle('fc-streak',FC.streak||0);const ks=document.getElementById('fc-known-stat');if(ks)ks.textContent=`✓ ${FC.known.size} van ${FC.terms.length} gekend`;}

function fcMark(known){
  if(FC._finished)return;
  const term=FC.terms[FC.idx];
  FC.history.push({idx:FC.idx,known,streak:FC.streak});
  const inner=document.getElementById('fc-inner');
  inner.style.transition='none';inner.classList.add(known?'fc-mark-right':'fc-mark-wrong');
  if(known){FC.known.add(term);FC.streak++;}else{FC.known.delete(term);FC.streak=0;}
  checkStreak(FC.streak);
  setTimeout(()=>{inner.classList.remove('fc-mark-right','fc-mark-wrong');inner.style.transition='';if(FC.idx<FC.terms.length-1){FC.idx++;fcUpdate();}else{FC._finished=true;showFCResults();}},350);

function fcHardReset(){FC={terms:FC.shuffleOn?shuffle([...SET.terms]):[...SET.terms],idx:0,flipped:false,front:FC.front||'term',shuffleOn:FC.shuffleOn!==undefined?FC.shuffleOn:true,loop:FC.loop||false,known:new Set(),history:[],streak:0,_active:true,_setId:SET.id,_origOrder:[...SET.terms],_finished:false};renderFlashcards();}
function fcUndoLastAction(){if(!FC.history.length)return;const last=FC.history.pop();FC.idx=last.idx;FC.streak=last.streak;const term=FC.terms[FC.idx];if(last.known)FC.known.delete(term);FC._finished=false;const o=document.getElementById('fc-results');if(o)o.style.display='none';fcUpdate();showToast('Actie ongedaan gemaakt');}
function fcReviewMistakes(){const mistakes=FC.terms.filter(t=>!FC.known.has(t));FC={terms:shuffle(mistakes),idx:0,flipped:false,front:FC.front,shuffleOn:true,loop:false,known:new Set(),history:[],streak:0,_active:true,_setId:SET.id,_origOrder:[...mistakes],_finished:false};renderFlashcards();}
function fcApplyShuffle(){FC.terms=FC.shuffleOn?shuffle([...SET.terms]):[...SET.terms];FC.idx=0;FC.known.clear();FC._finished=false;fcUpdate();}

/* ══════════════════════════════════════════
   STAMPEN — Verbeterde herhaallogica

   Tellers:
   - "Goed":     aantal correct beantwoord (incl. correct op herhaling)
   - "Herhalen": aantal termen dat momenteel nog herhaald moet worden
                 = _pendingRetry.length + _wrongRetry.length
   - Bij correct op herhaling: Herhalen -1, Goed +1
   - Bij fout op herhaling: telt NIET als extra fout, blijft in herhalen

   Retry volgorde:
   - _pendingRetry: nog niet vrijgegeven (na volgende checkpoint)
   - _wrongRetry: vrijgegeven na checkpoint, komen GEBUNDELD na de lopende
                  batch van hoofdqueue totdat die batch op is
   - Na checkpoint: flush _pendingRetry → _wrongRetry, dan eerst alle
     _wrongRetry afwerken voor nieuwe hoofdqueue-termen komen
══════════════════════════════════════════ */
let ST={};
function renderStampen(){

  const el=document.getElementById('main-screen');

          <div id="st-dd" class="settings-dropdown" style="display:none">

            <div class="settings-section"><div class="settings-section-title">Extra</div>
              <div class="settings-row"><span class="settings-row-label">Niveau</span><select class="settings-select" onchange="ST.typoLevel=+this.value"><option value="1" ${ST.typoLevel===1?'selected':''}>Soepel</option><option value="2" ${ST.typoLevel===2?'selected':''}>Gemiddeld</option><option value="3" ${ST.typoLevel===3?'selected':''}>Streng</option></select></div>
              <div class="settings-row"><span class="settings-row-label">Schudden</span><label class="toggle"><input type="checkbox" ${ST.shuffleOn?'checked':''} onchange="ST.shuffleOn=this.checked;stHardReset()"><span class="toggle-slider"></span></label></div>
              <div class="settings-row"><span class="settings-row-label">Hint tonen</span><label class="toggle"><input type="checkbox" ${ST.hints?'checked':''} onchange="ST.hints=this.checked"><span class="toggle-slider"></span></label></div>
              <div class="settings-row"><span class="settings-row-label">Juiste antw. overnemen</span><label class="toggle"><input type="checkbox" ${ST.copyCorrect?'checked':''} onchange="ST.copyCorrect=this.checked"><span class="toggle-slider"></span></label></div>

      <div class="progress-row"><div class="progress-track"><div class="progress-fill" id="st-prog" style="width:0%"></div></div>${streakCircleHTML('st-streak',ST.streak||0)}</div>
      <div class="stats-row" style="margin-top:12px">
        <div class="stat-box"><div class="stat-num stat-blue" id="st-left">${ST._queue.length}</div><div class="stat-label">Resterend</div></div>
        <div class="stat-box"><div class="stat-num stat-green" id="st-cor">${ST.correct}</div><div class="stat-label">Goed</div></div>
        <div class="stat-box" title="Termen die herhaling nodig hebben"><div class="stat-num stat-red" id="st-wr">${ST._pendingRetry.length+ST._wrongRetry.length}</div><div class="stat-label">Fout</div></div>
      </div>

    </div>`;
  if(ST._finished)stShowResultsOverlay();else stRenderQ();
}

function stBuildQueue(){
  ST._queue=ST.shuffleOn?shuffle([...SET.terms]):[...SET.terms];
  ST._wrongRetry=[];ST._pendingRetry=[];ST._retryBlock=false;
}

/*
  Logica:
  - _retryBlock=true: we zijn bezig met een blok herhaaltermen (_wrongRetry)
    Na checkpoint worden alle _pendingRetry geflushed naar _wrongRetry.
    Als _retryBlock actief is, halen we uit _wrongRetry.
    Als _wrongRetry leeg is, gaan we terug naar de hoofdwachtrij.
*/
function stGetCurrent(){
  // Als we in een retry-blok zitten en er zijn nog herhaaltermen
  if(ST._retryBlock && ST._wrongRetry.length > 0){
    return {t: ST._wrongRetry[0], isRetry: true};
  }
  // Retry-blok klaar of niet actief
  ST._retryBlock = false;

  // Hoofdwachtrij
  if(ST._queue.length > 0){
    return {t: ST._queue[0], isRetry: false};
  }

  // Hoofdwachtrij leeg: flush pending naar wrongRetry en start retry-blok
  if(ST._pendingRetry.length > 0){
    ST._wrongRetry.push(...ST._pendingRetry);
    ST._pendingRetry = [];
    ST._retryBlock = true;
    if(ST._wrongRetry.length > 0) return {t: ST._wrongRetry[0], isRetry: true};
  }

  // Alles klaar
  return null;
}

function stGetPair(t){
  let d=ST.qmode==='mix'?(ST._lastDir==='term'?'def':'term'):ST.qmode;
  ST._dir=d;ST._lastDir=d;
  return{q:d==='term'?t.term:t.def,a:d==='term'?t.def:t.term};
}

function stRenderQ(){
  const el=document.getElementById('st-main');if(!el)return;
  const done=ST.correct+ST.wrong;
  // Checkpoint elke 7 primaire vragen (niet retries)
  if(done>0&&done%7===0&&done!==(ST._cpDoneAt||0)&&!ST._retryBlock){
    ST._cpDoneAt=done;
    showCheckpoint();
    return;
  }
  const cur=stGetCurrent();
  if(!cur){ST._finished=true;stShowResultsOverlay();return;}
  const{t,isRetry}=cur;
  const{q,a}=stGetPair(t);
  ST._currentQ=q;ST._currentA=a;ST._currentT=t;ST._isRetry=isRetry;ST.answered=false;ST._copyDone=false;
  const useType=ST.itype==='mix'?(Math.random()>.5?'open':'mc'):ST.itype;
  ST._useType=useType;
  const hintLen=Math.ceil(a.length/3);
  const hintText=a.slice(0,hintLen)+'...';
  const qlabel=ST._dir==='term'?'Definitie van:':'Begrip voor:';
  let body='';
  if(useType==='mc'){
    const opts=shuffle([a,...shuffle(SET.terms.filter(x=>x!==t)).slice(0,3).map(x=>ST._dir==='term'?x.def:x.term)]);
    body=`<div class="mc-options" id="st-mc-opts">${opts.map((o,i)=>`<button class="mc-option" id="st-opt-${i}" onclick="stPickMC(${i},'${escA(o)}','${escA(a)}')">${'ABCD'[i]}. ${esc(o)}</button>`).join('')}</div>
    <div id="st-fb" style="display:none;margin-top:8px"></div>
    <div id="st-next-area" style="display:none;text-align:center;margin-top:10px"><button class="btn btn-glass btn-sm" onclick="stNext()">Volgende →</button></div>`;
  } else {
    body=`<div style="margin-bottom:12px"><input type="text" id="st-inp" placeholder="Jouw antwoord..." onkeydown="if(event.key==='Enter')stCheckOpen()" autocomplete="off"></div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="stCheckOpen()">Controleer</button>
      ${ST.hints?`<button class="st-hint-btn" onclick="document.getElementById('st-hint-area').innerHTML='<span style=color:var(--accent);font-weight:700>Hint: ${escA(hintText)}</span>'">💡 Hint</button>`:''}
      <button class="btn btn-glass" onclick="stSkip()">Sla over</button>
    </div>
    <div id="st-fb" style="display:none;margin-top:12px"></div>
    <div id="st-copy-area" style="display:none;margin-top:12px"></div>
    <div id="st-next-area" style="display:none;text-align:center;margin-top:10px"><button class="btn btn-glass btn-sm" onclick="stNext()">Volgende →</button></div>`;
  }
  el.innerHTML=`
    <div class="st-qbox" style="animation:cardLeft .3s var(--ease2)">
      <div class="st-qlabel">${qlabel}${isRetry?' <span style="font-size:10px;background:rgba(232,58,74,0.15);color:var(--red);padding:2px 8px;border-radius:20px;margin-left:6px">Herhaling</span>':''}</div>
      <div class="st-qtext">${ST._dir==='term'?renderTerm(ST._currentT,'term')+renderImages(ST._currentT):renderTerm(ST._currentT,'def')}</div>
      <div id="st-hint-area" style="margin:8px 0;font-size:14px"></div>
    </div>${body}`;
  if(useType==='open')setTimeout(()=>document.getElementById('st-inp')?.focus(),60);
}

function stPickMC(idx,chosen,answer){
  if(ST.answered)return;
  const ok=chosen===answer;ST.answered=true;
  document.querySelectorAll('#st-mc-opts .mc-option').forEach(b=>{b.classList.remove('sel-correct','sel-wrong');b.style.pointerEvents='none';});
  document.getElementById('st-opt-'+idx).classList.add(ok?'sel-correct':'sel-wrong');
  if(ok){
    ST.correct++;ST.streak++;
    if(!ST._isRetry){
      ST._queue.shift();
    } else {
      // Correct op herhaling: verwijder uit wrongRetry, update teller
      ST._wrongRetry.shift();
      ST.wrongItems=ST.wrongItems.filter(w=>w.t!==ST._currentT);
    }
    checkStreak(ST.streak);stUpdateStats();
    const fb=document.getElementById('st-fb');if(fb){fb.style.display='block';fb.className='st-feedback fb-correct';fb.innerHTML='✓ Correct! 🎉';}
    setTimeout(()=>stRenderQ(),1000);
  } else {
    ST.streak=0;
    if(!ST._isRetry){
      ST.wrong++;
      ST.wrongItems.push({q:ST._currentQ,a:ST._currentA,given:chosen,t:ST._currentT});
      ST._pendingRetry.push(ST._currentT);
      ST._queue.shift();
    } else {
      // Fout op herhaling: herplan na volgende checkpoint, niet extra wrong
      ST._wrongRetry.shift();
      ST._pendingRetry.push(ST._currentT);
    }
    stUpdateStats();
    const fb=document.getElementById('st-fb');if(fb){fb.style.display='block';fb.className='st-feedback fb-wrong';fb.innerHTML=`✗ Fout. Juist: <strong>${esc(answer)}</strong>`;}
    const na=document.getElementById('st-next-area');if(na)na.style.display='block';
  }
}

function stCheckOpen(){
  const inp=document.getElementById('st-inp');if(!inp)return;
  if(ST.answered)return;
  const val=inp.value.trim();
  if(!val){inp.classList.add('shake-anim');setTimeout(()=>inp.classList.remove('shake-anim'),400);return;}
  ST.answered=true;inp.disabled=true;
  const ok=checkAns(val,ST._currentA,ST.typoLevel);
  if(ok){
    ST.correct++;ST.streak++;
    if(!ST._isRetry){
      ST._queue.shift();
    } else {
      ST._wrongRetry.shift();
      ST.wrongItems=ST.wrongItems.filter(w=>w.t!==ST._currentT);
    }
    checkStreak(ST.streak);stUpdateStats();
    const fb=document.getElementById('st-fb');if(fb){fb.style.display='block';fb.className='st-feedback fb-correct';fb.innerHTML='✓ Correct! 🎉';}
    const na=document.getElementById('st-next-area');if(na)na.style.display='block';
    setTimeout(()=>stRenderQ(),1200);
  } else {
    ST.streak=0;
    if(!ST._isRetry){
      ST.wrong++;
      ST.wrongItems.push({q:ST._currentQ,a:ST._currentA,given:val,t:ST._currentT});
      ST._pendingRetry.push(ST._currentT);
      ST._queue.shift();
    } else {
      ST._wrongRetry.shift();
      ST._pendingRetry.push(ST._currentT);
    }
    stUpdateStats();
    const fb=document.getElementById('st-fb');
    if(fb){
      fb.style.display='block';fb.className='st-feedback fb-wrong';
      fb.innerHTML=`✗ Fout. Juist: <strong>${esc(ST._currentA)}</strong><br><button class="fb-override-btn" onclick="stOverride()">✓ Ik had het toch goed</button>`;
    }
    if(ST.copyCorrect){
      stShowCopyInput();
    } else {
      const na=document.getElementById('st-next-area');if(na)na.style.display='block';
    }
  }
}

function stShowCopyInput(){
  const ca=document.getElementById('st-copy-area');
  if(!ca)return;
  ca.style.display='block';
  ca.innerHTML=`
    <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px">
      ✏️ Typ het juiste antwoord over om door te gaan:
    </div>
    <input type="text" id="st-copy-inp" placeholder="${escA(ST._currentA)}" autocomplete="off"
      oninput="stCheckCopyInput(this)"
      onkeydown="if(event.key==='Enter')stCheckCopyInput(document.getElementById('st-copy-inp'),true)">
    <div id="st-copy-fb" style="font-size:12px;color:var(--text3);margin-top:4px">Typ exact: <em>${esc(ST._currentA)}</em></div>`;
  setTimeout(()=>document.getElementById('st-copy-inp')?.focus(),60);
}

function stCheckCopyInput(inp,forceCheck){
  if(!inp)return;
  const val=inp.value;
  const correct=ST._currentA;
  if(val===correct){
    inp.classList.add('copy-inp-correct');inp.disabled=true;
    const fb=document.getElementById('st-copy-fb');
    if(fb){fb.style.color='var(--green)';fb.textContent='✓ Goed overgenomen!';}
    const na=document.getElementById('st-next-area');if(na)na.style.display='block';
    ST._copyDone=true;
  } else if(forceCheck){
    inp.classList.add('shake-anim');setTimeout(()=>inp.classList.remove('shake-anim'),400);
  }
}

function stOverride(){
  if(!ST._isRetry){ST.wrong=Math.max(0,ST.wrong-1);ST.correct++;}
  else{ST.correct++;}
  ST.streak=(ST._streakBeforeWrong||0)+1;
  // Verwijder uit retry-wachtrij
  if(ST._isRetry){
    // Het item was al geshifted uit wrongRetry bij de foutmelding, zit nu in pendingRetry
    ST._pendingRetry=ST._pendingRetry.filter(x=>x!==ST._currentT);
  } else {
    ST._pendingRetry=ST._pendingRetry.filter(x=>x!==ST._currentT);
  }
  ST.wrongItems=ST.wrongItems.filter(w=>w.t!==ST._currentT);
  const fb=document.getElementById('st-fb');if(fb){fb.className='st-feedback fb-correct';fb.innerHTML='✓ Als goed gerekend!';}
  const ca=document.getElementById('st-copy-area');if(ca)ca.style.display='none';
  checkStreak(ST.streak);stUpdateStats();
  setTimeout(()=>stRenderQ(),800);
}

function stSkip(){
  if(ST.answered)return;
  ST.answered=true;ST.streak=0;
  if(!ST._isRetry){
    ST.wrong++;
    ST.wrongItems.push({q:ST._currentQ,a:ST._currentA,given:'(overgeslagen)',t:ST._currentT});
    ST._pendingRetry.push(ST._currentT);
    ST._queue.shift();
  } else {
    ST._wrongRetry.shift();
    ST._pendingRetry.push(ST._currentT);
  }
  stUpdateStats();
  const fb=document.getElementById('st-fb');
  if(fb){fb.style.display='block';fb.className='st-feedback fb-wrong';fb.innerHTML=`Overgeslagen. Juist antwoord: <strong>${esc(ST._currentA)}</strong>`;}
  if(ST.copyCorrect&&ST._useType==='open'){
    stShowCopyInput();
  } else {
    const na=document.getElementById('st-next-area');if(na)na.style.display='block';
  }
  const inp=document.getElementById('st-inp');if(inp)inp.disabled=true;
  document.querySelectorAll('.st-hint-btn').forEach(b=>b.disabled=true);
}

function stNext(){
  if(ST.copyCorrect&&ST._useType==='open'&&ST.answered&&!ST._copyDone){
    const ca=document.getElementById('st-copy-area');
    if(ca&&ca.style.display!=='none'){
      const inp=document.getElementById('st-copy-inp');
      if(inp){inp.classList.add('shake-anim');setTimeout(()=>inp.classList.remove('shake-anim'),400);}
      return;
    }
  }
  stRenderQ();
}

function stUpdateStats(){
  const retryCount = ST._pendingRetry.length + ST._wrongRetry.length;
  const remaining = ST._queue.length;
  document.getElementById('st-left').textContent = remaining;
  document.getElementById('st-cor').textContent = ST.correct;
  document.getElementById('st-wr').textContent = retryCount;
  const done=ST.correct+ST.wrong;
  const total=done+remaining+retryCount;
  const prog=document.getElementById('st-prog');
  if(prog)prog.style.width=Math.round((done/Math.max(total,1))*100)+'%';
  updateStreakCircle('st-streak',ST.streak||0);
}

function stShowResultsOverlay(){
  const pct=Math.round((ST.correct/(ST.correct+ST.wrong||1))*100);
  const o=document.getElementById('st-results');if(!o)return;o.style.display='flex';
  o.innerHTML=`<div style="font-size:40px;margin-bottom:8px">🎉</div><div class="results-pct">${pct}%</div><div style="color:var(--text2);font-weight:600;font-size:17px;margin-bottom:24px">${ST.correct} goed, ${ST.wrong} fout</div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn btn-primary btn-lg" onclick="stHardReset()">↺ Opnieuw</button><button class="btn btn-glass btn-lg" onclick="backToSet()">Terug</button></div>
    ${ST.wrongItems.length?`<div style="text-align:left;width:100%;max-width:500px;margin-top:24px"><div style="font-size:16px;font-weight:800;margin-bottom:12px">Foute antwoorden (${ST.wrongItems.length})</div>${ST.wrongItems.map(w=>`<div class="wrong-item"><div style="font-size:12px;color:var(--text3);font-weight:600;margin-bottom:3px">Vraag: ${esc(w.q)}</div><div style="color:var(--red);font-size:14px;font-weight:700">✗ ${esc(w.given)}</div><div style="color:var(--green);font-size:14px;font-weight:700">✓ ${esc(w.a)}</div></div>`).join('')}</div>`:''}`;
}

function stHardReset(){
  if(confirm('Weet je zeker dat je opnieuw wilt beginnen?')){
    const s={qmode:ST.qmode,itype:ST.itype,shuffleOn:ST.shuffleOn,typoLevel:ST.typoLevel,hints:ST.hints,copyCorrect:ST.copyCorrect};
    ST={...s,terms:s.shuffleOn?shuffle([...SET.terms]):[...SET.terms],correct:0,wrong:0,streak:0,wrongItems:[],_active:true,_setId:SET.id,_finished:false,_queue:[],_wrongRetry:[],_pendingRetry:[],_retryBlock:false,_cpDoneAt:-1};
    stBuildQueue();renderStampen();
  }
}

function showCheckpoint(){
  // Flush pending retries → wrongRetry nu pas, zodat ze NA de checkpoint komen
  if(ST._pendingRetry.length>0){
    ST._wrongRetry.push(...ST._pendingRetry);
    ST._pendingRetry=[];
    // Na checkpoint starten we een retry-blok
    ST._retryBlock = ST._wrongRetry.length > 0;
  }
  const done=ST.correct+ST.wrong;
  const retryCount=ST._wrongRetry.length+ST._pendingRetry.length;
  const remaining=ST._queue.length;
  const total=done+remaining+retryCount;
  const pct=Math.round((done/Math.max(total,1))*100);
  document.getElementById('checkpoint-layer').innerHTML=`

function ohBuild(){
  const source=OH.shuffleOn?shuffle([...SET.terms]):[...SET.terms];

    let d=OH.qmode==='mix'?(Math.random()>.5?'term':'def'):OH.qmode;

    let type=OH.itype==='mix'?(Math.random()>.5?'mc':'open'):OH.itype;
    let opts=null;
    if(type==='mc'){const others=shuffle(SET.terms.filter(x=>x!==t)).slice(0,OH.numOpts-1).map(x=>d==='term'?x.def:x.term);opts=shuffle([a,...others]);}
    return{i,t,q,a,type,opts,dir:d};
  });
  OH.answers={};
  document.getElementById('oh-questions').innerHTML=OH.questions.map((qq,i)=>`
    <div style="background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:20px;margin-bottom:12px;animation:slideUp ${.1+i*.05}s var(--ease2) both" id="oh-q-${i}">

      :`<input type="text" id="oh-open-${i}" placeholder="Jouw antwoord..." oninput="ohOpenInput(${i},this.value)" autocomplete="off">`}
    </div>`).join('');
}
function ohPickMC(qi,oi,chosen,answer){
  document.querySelectorAll(`#oh-opts-${qi} .mc-option`).forEach(b=>{b.style.background='';b.style.borderColor='';b.style.fontWeight='600';});
  const btn=document.getElementById(`oh-opt-${qi}-${oi}`);

  const accentLight=getComputedStyle(document.documentElement).getPropertyValue('--accent-light').trim();
  btn.style.background=accentLight;btn.style.borderColor=accentColor;btn.style.fontWeight='800';
  OH.answers[qi]={type:'mc',chosen,answer,correct:chosen===answer};ohCheckAll();
}
function ohOpenInput(qi,val){OH.answers[qi]={type:'open',chosen:val,answer:OH.questions[qi].a};ohCheckAll();}
function ohCheckAll(){
  const total=OH.questions.length,done=Object.keys(OH.answers).length;
  const prog=document.getElementById('oh-prog');if(prog)prog.style.width=Math.round((done/total)*100)+'%';

  const sb=document.getElementById('oh-submit');if(sb)sb.style.display=done>=total?'':'none';
}
function ohSubmit(){
  let correct=0;
  OH.questions.forEach((qq,i)=>{const ans=OH.answers[i]||{correct:false,chosen:'—',answer:qq.a,type:qq.type};if(ans.type==='open')ans.correct=checkAns(ans.chosen,qq.a,OH.typoLevel);OH.answers[i]=ans;if(ans.correct)correct++;});

}

function showModal(html){document.getElementById('modal-panel').innerHTML=html;document.getElementById('modal-bg').style.display='flex';}

let _tt;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500);}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();document.getElementById('milestone-overlay').classList.remove('active');if(openDD)closeDD(openDD);}
  if(currentMode==='flashcards'){
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key==='ArrowLeft'){e.preventDefault();fcMark(false);}
    else if(e.key==='ArrowRight'){e.preventDefault();fcMark(true);}
    else if(e.key===' '){e.preventDefault();fcFlip();}
  }
});

function renderCombineList(query){
  const allSets = JSON.parse(localStorage.getItem('sd_sets')||'[]');
  const q = (query||'').toLowerCase().trim();
  const filtered = allSets.filter(s =>
    !q ||
    s.title.toLowerCase().includes(q) ||
    (s.vak&&s.vak.toLowerCase().includes(q))
  );

  const el = document.getElementById('combine-sets-list');
  if(!el)return;

  if(!filtered.length){
    el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Geen sets gevonden</div>';
    return;
  }

  el.innerHTML = filtered.map(s => {
    const isSelected = _combineSelected.has(s.id);
    const isCurrent = s.id === SET.id;
    const isDisabled = !isSelected && _combineSelected.size >= 5;
    return `
      <div class="combine-set-item${isSelected?' selected':''}${isDisabled?' disabled':''}" onclick="toggleCombineSet('${s.id}')" id="csi-${s.id}">
        <div class="combine-check">${isSelected?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>
        <div>
          <div class="combine-set-title">${esc(s.title)}${isCurrent?' <span style="font-size:11px;background:var(--accent-light);color:var(--accent);padding:1px 6px;border-radius:10px;margin-left:4px">Huidig</span>':''}</div>
          <div class="combine-set-meta">${s.terms.length} begrippen${s.vak?' · '+esc(s.vak):''}</div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleCombineSet(id){
  if(id === SET.id) return; // Can't deselect current
  if(_combineSelected.has(id)){
    _combineSelected.delete(id);
  } else {
    if(_combineSelected.size >= 5){ showToast('Maximum 5 sets selecteerbaar'); return; }
    _combineSelected.add(id);
  }
  // Re-render list keeping search query
  const q = document.getElementById('combine-search-inp')?.value || '';
  renderCombineList(q);
  updateCombineInfo();
}

function updateCombineInfo(){
  const el = document.getElementById('combine-selected-info');
  if(el) el.textContent = `${_combineSelected.size} van max. 5 sets geselecteerd`;
}

function doCombinateSets(){
  if(_combineSelected.size < 2){ showToast('Selecteer minimaal 2 sets'); return; }
  const allSets = JSON.parse(localStorage.getItem('sd_sets')||'[]');
  const selected = [..._combineSelected].map(id => allSets.find(s=>s.id===id)).filter(Boolean);
  if(selected.length < 2){ showToast('Kon niet alle geselecteerde sets vinden'); return; }

  // Combine terms (deduplicate by term text)
  const seenTerms = new Set();
  const combinedTerms = [];
  selected.forEach(s => {
    s.terms.forEach(t => {
      const key = (t.term||'').toLowerCase().trim();
      if(!seenTerms.has(key)){ seenTerms.add(key); combinedTerms.push({...t}); }
    });
  });

  // Generate name "Mijn combinatie (N)"
  const existingSets = allSets.map(s=>s.title);
  let num = 1;
  while(existingSets.includes(`Mijn combinatie (${num})`)) num++;
  const newTitle = `Mijn combinatie (${num})`;
  const newSlug = toSlug(newTitle);
  const newSet = {
    id: 'set_combo_'+Date.now(),
    slug: newSlug,
    title: newTitle,
    description: 'Combinatie van: '+selected.map(s=>s.title).join(', '),
    vak: '',
    datum: new Date().toISOString().split('T')[0],
    terms: combinedTerms
  };

  allSets.push(newSet);
  localStorage.setItem('sd_sets', JSON.stringify(allSets));
  closeModal();
  showToast(`✓ "${newTitle}" aangemaakt (${combinedTerms.length} begrippen)!`);
  setTimeout(()=>{ window.location.href=`set.html?set=${encodeURIComponent(newSlug)}`; }, 700);
}

/* PDF */
function printSetPDF(){
  if(!SET||!SET.terms.length){showToast('Geen begrippen om af te drukken');return;}
  let attempts=0;
  const checkInterval=setInterval(()=>{
    attempts++;
    let jsPDFClass=null;
    if(window.jspdf&&window.jspdf.jsPDF)jsPDFClass=window.jspdf.jsPDF;
    else if(window.jsPDF&&window.jsPDF.jsPDF)jsPDFClass=window.jsPDF.jsPDF;
    else if(window.jsPDF)jsPDFClass=window.jsPDF;
    if(jsPDFClass){clearInterval(checkInterval);generatePDF(jsPDFClass);}
    else if(attempts>30){clearInterval(checkInterval);showToast('PDF bibliotheek laadt niet. Probeer later opnieuw');}
  },100);
}
function generatePDF(jsPDFClass){
  try{
    const doc=new jsPDFClass();
    let yPos=30;
    const pageHeight=doc.internal.pageSize.height;
    const margins={left:20,right:20,top:20,bottom:20};
    doc.setFont('Helvetica','bold');doc.setFontSize(18);
    doc.text(`${SET.title}`,margins.left,20);
    const col1X=margins.left,col2X=105,colWidth=80;
    SET.terms.forEach((term)=>{
      if(yPos>pageHeight-margins.bottom){doc.addPage();yPos=margins.top;}
      doc.setFont('Helvetica','bold');doc.setFontSize(10);
      const termText=(term.term||'').replace(/[\x00-\x1F]/g,' ').replace(/<[^>]*>/g,'');
      const termLines=doc.splitTextToSize(termText,colWidth);
      doc.text(termLines,col1X,yPos);
      doc.setFont('Helvetica','normal');
      const defText=(term.def||'').replace(/[\x00-\x1F]/g,' ').replace(/<[^>]*>/g,'');
      const defLines=doc.splitTextToSize(defText,colWidth);
      doc.text(defLines,col2X,yPos);
      yPos+=Math.max(termLines.length,defLines.length)*7+5;
    });
    const filename=(SET.title||'begrippen').replace(/[^a-zA-Z0-9_-]/g,'_')+'.pdf';
    doc.save(filename);showToast('✓ PDF gedownload!');
  }catch(e){console.error('PDF generation error:',e);showToast('Fout bij PDF genereren: '+e.message);}
}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */

function getOfflineSets() {
  try { return JSON.parse(localStorage.getItem('sd_offline_sets') || '[]'); } catch(e) { return []; }
}
function saveOfflineSets(arr) {
  try { localStorage.setItem('sd_offline_sets', JSON.stringify(arr)); } catch(e) {}
}

function isSetOffline() {
  if (!SET) return false;
  const offline = getOfflineSets();
  return offline.some(s => s.id === SET.id || s.slug === SET.slug);
}

function toggleOfflineSet() {
  if (!SET) return;
  let offline = getOfflineSets();
  if (isSetOffline()) {
    offline = offline.filter(s => s.id !== SET.id && s.slug !== SET.slug);
    saveOfflineSets(offline);
    // Ook uit sd_sets verwijderen als het een gedownloade server-set is
    let sets = JSON.parse(localStorage.getItem('sd_sets') || '[]');
    // Alleen verwijderen als het NIET een lokale set is
    if (SET.fromServer || SET._serverFile) {
      sets = sets.filter(s => s.id !== SET.id && s.slug !== SET.slug);
      localStorage.setItem('sd_sets', JSON.stringify(sets));
    }
    showToast('Set verwijderd uit offline opslag');
  } else {
    // Sla de volledige set op
    const setToSave = { ...SET, _offlineSaved: true, _offlineSavedAt: Date.now() };
    offline.push({ id: SET.id, slug: SET.slug, title: SET.title });
    saveOfflineSets(offline);
    // Zorg dat de set ook in sd_sets zit
    let sets = JSON.parse(localStorage.getItem('sd_sets') || '[]');
    const idx = sets.findIndex(s => s.id === SET.id || s.slug === SET.slug);
    if (idx >= 0) { sets[idx] = setToSave; } else { sets.push(setToSave); }
    localStorage.setItem('sd_sets', JSON.stringify(sets));
    showToast('✓ Set beschikbaar gemaakt voor offline gebruik!');
  }
  updateOfflineBtn();
  closeDD('set-menu');
}

function downloadVset() {
  if (!SET) return;
  const VSET_KEY = _k.join('');
  function xorStr(str, key) {
    return str.split('').map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ key.charCodeAt(i % key.length))).join('');
  }
  const json = JSON.stringify(SET);
  const encoded = btoa(unescape(encodeURIComponent(xorStr(json, VSET_KEY))));
  const blob = new Blob([encoded], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (SET.slug || toSlug(SET.title)) + '.vset';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ .vset bestand gedownload!');
  closeDD('set-menu');
}
