<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyDeck</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-grad:linear-gradient(160deg,#f0eef9 0%,#ddd8f0 50%,#cfc8e8 100%);
  --glass:rgba(255,255,255,0.90);
  --glass2:rgba(255,255,255,0.80);
  --glass-border:rgba(200,195,230,0.6);
  --glass-shadow:0 2px 8px rgba(0,98,255,0.1),inset 1px 1px 0 rgba(255,255,255,1),inset -1px -1px 2px rgba(255,255,255,0.5);
  --glass-shadow-lg:0 8px 32px rgba(0,98,255,0.15),inset 1px 1px 0 rgba(255,255,255,1),inset -1px -1px 2px rgba(255,255,255,0.5);
  --text:#0b0f2a;--text2:#3d3a55;--text3:#7c7899;
  --accent:#0062ff;--accent2:#0075ff;--accent-light:rgba(0,98,255,0.12);
  --green:#18b672;--red:#e83a4a;--orange:#f07b20;
  --r:20px;--r2:28px;--r3:14px;--r4:10px;
  --font:'DM Sans',sans-serif;
  --ease:cubic-bezier(0,0,.47,1.15);
  --ease2:cubic-bezier(0.34,1.56,0.64,1);
}
html{min-height:100vh;font-family:var(--font);color:var(--text);font-size:16px;overflow-x:hidden}
body{min-height:100vh;background:var(--bg-grad);background-attachment:fixed;display:flex;flex-direction:column}

nav{
  position:sticky;top:0;z-index:200;
  background:rgba(240,238,249,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(200,195,230,0.5);
  padding:0 28px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--glass-shadow);
}
.nav-logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
.nav-logo-icon{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#0062ff,#0075ff);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 10px rgba(0,98,255,0.35),inset 1px 1px 0 rgba(255,255,255,0.6);}
.nav-actions{display:flex;gap:12px;align-items:center;flex:1;margin-left:20px}
.search-box{
  flex:1;max-width:400px;
  height:36px;
  background:linear-gradient(180deg,rgba(255,255,255,0.7) 0%,rgba(255,255,255,0.5) 100%);
  border:1px solid rgba(200,195,230,0.6);
  border-radius:18px;
  padding:0 14px;
  font-family:var(--font);
  font-size:14px;
  color:var(--text);
  outline:none;
  transition:all .2s;
  box-shadow:inset 1px 1px 0 rgba(255,255,255,1),0 2px 6px rgba(80,60,160,0.06);
}
.search-box::placeholder{color:var(--text3)}
.search-box:focus{
  background:rgba(255,255,255,0.9);
  border-color:#0062ff;
  box-shadow:0 0 0 3px rgba(0,98,255,0.12),inset 1px 1px 0 rgba(255,255,255,1)
}
.nav-spacer{flex:1}
.nav-actions{display:flex;gap:8px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--r3);cursor:pointer;font-family:var(--font);font-size:14px;font-weight:700;padding:9px 18px;transition:all .2s var(--ease);outline:none;white-space:nowrap;box-shadow:var(--glass-shadow)}
.btn-primary{background:linear-gradient(180deg,#0062ff 0%,rgba(0,98,255,0.85) 100%);color:#fff;box-shadow:0 2px 12px rgba(0,98,255,0.35),inset 1px 1px 0 rgba(255,255,255,0.25);}
.btn-primary:hover{filter:brightness(1.15);transform:scale(1.04) translateY(-1px)}
.btn-glass{background:linear-gradient(180deg,rgba(255,255,255,0.9) 0%,rgba(255,255,255,0.75) 100%);color:var(--text);box-shadow:var(--glass-shadow);border:none;}
.btn-glass:hover{background:rgba(255,255,255,0.95);transform:scale(1.04);box-shadow:var(--glass-shadow-lg)}
.btn-glass:active,.btn-primary:active{transform:scale(0.97)}
.btn-lg{padding:13px 26px;font-size:16px;border-radius:var(--r)}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:var(--r4)}
.btn-icon{width:40px;height:40px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(255,255,255,0.9) 0%,rgba(255,255,255,0.75) 100%);box-shadow:var(--glass-shadow);border:none;border-radius:12px;cursor:pointer;}
.btn-icon:hover{background:rgba(255,255,255,0.95);transform:scale(1.08);box-shadow:var(--glass-shadow-lg)}

.sidebar{
  position:fixed;left:0;top:64px;z-index:180;
  width:80px;height:calc(100vh - 64px);
  background:linear-gradient(180deg,rgba(240,238,249,0.8) 0%,rgba(230,225,245,0.7) 100%);
  backdrop-filter:blur(10px);
  border-right:1px solid rgba(200,195,230,0.4);
  display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;
  box-shadow:2px 0 12px rgba(80,60,160,0.08)
}
.sidebar-btn{
  width:56px;height:56px;
  border-radius:16px;
  background:linear-gradient(180deg,rgba(255,255,255,0.6) 0%,rgba(255,255,255,0.4) 100%);
  border:1px solid rgba(200,195,230,0.5);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
  box-shadow:1px 1px 2px rgba(255,255,255,0.9) inset,-1px -1px 2px rgba(255,255,255,0.6) inset,0 2px 8px rgba(80,60,160,0.08);
  font-size:24px;color:var(--text);font-weight:700;
}
.sidebar-btn:hover{
  background:rgba(255,255,255,0.8);
  transform:scale(1.05);
  box-shadow:1px 1px 2px rgba(255,255,255,1) inset,-1px -1px 2px rgba(255,255,255,0.8) inset,0 4px 12px rgba(80,60,160,0.12)
}
.sidebar-btn.active{
  background:linear-gradient(180deg,#0062ff 0%,rgba(0,98,255,0.9) 100%);
  color:#fff;
  box-shadow:0 4px 12px rgba(0,98,255,0.35),inset 1px 1px 0 rgba(255,255,255,0.3)
}
.sidebar-label{font-size:9px;color:var(--text2);font-weight:700;margin-top:4px;text-align:center;letter-spacing:-0.5px;max-width:60px}

/* Regular inputs for title/vak/etc */
input[type="text"],input[type="date"],textarea,select{
  background:rgba(255,255,255,0.85);border:1px solid rgba(200,195,230,0.6);
  border-radius:var(--r3);color:var(--text);font-family:var(--font);font-size:15px;
  padding:11px 16px;outline:none;transition:all .2s;width:100%;
  box-shadow:inset 1px 1px 0 rgba(255,255,255,1),0 2px 6px rgba(80,60,160,0.06);
}
input[type="text"]:focus,input[type="date"]:focus,textarea:focus,select:focus{
  border-color:#0062ff;background:rgba(255,255,255,0.98);
  box-shadow:0 0 0 3px rgba(0,98,255,0.12),inset 1px 1px 0 rgba(255,255,255,1);
}
textarea{resize:vertical;min-height:72px;line-height:1.5}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-group label{font-size:13px;color:var(--text2);font-weight:600}

/* ── RICH TEXT EDITOR (contenteditable) ── */
.rich-editor{
  background:rgba(255,255,255,0.85);
  border:1.5px solid rgba(200,195,230,0.6);
  border-radius:var(--r3);
  color:var(--text);
  font-family:var(--font);
  font-size:14px;
  line-height:1.5;
  padding:10px 14px;
  outline:none;
  transition:all .2s;
  min-height:42px;
  width:100%;
  box-shadow:inset 1px 1px 0 rgba(255,255,255,1),0 2px 6px rgba(80,60,160,0.06);
  word-break:break-word;
  white-space:pre-wrap;
  cursor:text;
}
.rich-editor:focus{
  border-color:#0062ff;
  background:rgba(255,255,255,0.99);
  box-shadow:0 0 0 3px rgba(0,98,255,0.12),inset 1px 1px 0 rgba(255,255,255,1);
}
.rich-editor:empty::before{
  content:attr(data-placeholder);
  color:var(--text3);
  pointer-events:none;
}
.rich-editor b{font-weight:700}
.rich-editor i{font-style:italic}

/* ── FORMATTING TOOLBAR ── */
.fmt-bar{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  background:rgba(250,249,255,0.97);
  border:1px solid rgba(200,195,230,0.5);
  border-radius:var(--r4);
  padding:6px 8px;
  margin-top:4px;
  box-shadow:0 4px 16px rgba(80,60,160,0.1);
  opacity:0;pointer-events:none;
  transform:translateY(-4px);
  transition:opacity .15s,transform .15s;
}
.fmt-bar.visible{opacity:1;pointer-events:all;transform:translateY(0)}

.fmt-sep{width:1px;height:20px;background:rgba(200,195,230,0.5);margin:0 2px;flex-shrink:0}

/* Format buttons */
.fmt-btn{
  width:28px;height:28px;
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(200,195,230,0.4);
  border-radius:6px;cursor:pointer;
  font-size:13px;font-weight:700;
  transition:all .12s;flex-shrink:0;
  color:var(--text2);
  user-select:none;
}
.fmt-btn:hover{background:rgba(255,255,255,1);border-color:rgba(0,98,255,0.4);color:var(--accent)}
.fmt-btn.active{background:#0062ff;color:#fff;border-color:#0062ff}
.fmt-btn.active:hover{background:#3445ee}

/* Color swatches */
.color-swatch{
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;
  transition:all .12s;flex-shrink:0;
  outline:2px solid transparent;
  outline-offset:1px;
}
.color-swatch:hover{transform:scale(1.15);outline-color:rgba(0,98,255,0.4)}
.color-swatch.active{outline-color:#0062ff;border-color:#fff}

/* Clear formatting */
.fmt-clear{
  font-size:11px;padding:4px 8px;border-radius:6px;height:26px;
  background:rgba(232,58,74,0.08);color:var(--red);
  border:1px solid rgba(232,58,74,0.2);cursor:pointer;
  display:inline-flex;align-items:center;
  font-family:var(--font);font-weight:700;
  transition:all .12s;white-space:nowrap;
  user-select:none;
}
.fmt-clear:hover{background:rgba(232,58,74,0.15)}

/* Image upload */
.img-upload-btn{
  font-size:11px;padding:4px 8px;border-radius:6px;height:26px;
  background:rgba(0,98,255,0.08);color:#0062ff;
  border:1px dashed rgba(0,98,255,0.3);cursor:pointer;
  display:inline-flex;align-items:center;gap:3px;
  font-family:var(--font);font-weight:700;
  transition:all .12s;white-space:nowrap;
  user-select:none;
}
.img-upload-btn:hover{background:rgba(0,98,255,0.15)}
.image-gallery{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.image-thumb{width:52px;height:52px;border-radius:6px;object-fit:cover;border:2px solid rgba(200,195,230,0.4);cursor:pointer;transition:all .15s}
.image-thumb:hover{border-color:var(--red);transform:scale(1.05)}

/* Pair rows */
.pair-row{
  display:grid;
  grid-template-columns:28px 1fr 1fr 28px;
  gap:8px;
  align-items:start;
  margin-bottom:10px;
  padding:10px;
  background:rgba(255,255,255,0.4);
  border-radius:10px;
  border:1px solid rgba(200,195,230,0.2);
  transition:border-color .15s;
}
.pair-row:focus-within{border-color:rgba(0,98,255,0.2);background:rgba(255,255,255,0.55)}
.pair-num{
  width:26px;height:26px;border-radius:50%;
  background:rgba(0,98,255,0.1);color:#0062ff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;flex-shrink:0;margin-top:8px;
}
.pair-del{
  width:26px;height:26px;border-radius:50%;
  background:none;border:none;color:var(--text3);
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:20px;
  transition:all .15s;margin-top:8px;line-height:1;
  user-select:none;
}
.pair-del:hover{color:var(--red);background:rgba(232,58,74,0.1)}
.pair-col{display:flex;flex-direction:column;gap:0px;min-width:0}

/* ── PRESET COLORS ── */
/* defined in JS: COLORS */

.screen{padding:28px 32px;max-width:1200px;margin:0 auto;width:100%;margin-left:80px}
@keyframes pageIn{from{opacity:0;transform:scale(0.94) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.page-enter{animation:pageIn .4s var(--ease2) both}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.home-hero{text-align:center;padding:40px 0 28px}
.home-hero h1{font-size:46px;font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:10px}
.home-hero h1 span{background:linear-gradient(135deg,#0062ff 0%,#0075ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-hero{text-align:left}
.home-hero p{color:var(--text2);font-size:17px;max-width:440px;margin:0 0 28px;text-align:left}
.home-hero .meta-info{display:flex;gap:20px;justify-content:flex-start;margin-bottom:24px;flex-wrap:wrap}
.meta-item{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:14px 20px;box-shadow:1px 1px 2px rgba(255,255,255,0.9) inset,-1px -1px 2px rgba(255,255,255,0.6) inset,0 2px 8px rgba(0,98,255,0.08)}
.meta-item .label{font-size:12px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.meta-item .value{font-size:24px;font-weight:800;color:#0062ff;margin-top:4px}

.section-row{display:flex;align-items:center;justify-content:space-between;margin:32px 0 16px;gap:12px}
.section-row h2{font-size:20px;font-weight:800;letter-spacing:-0.3px}
.section-row a{color:var(--accent);font-size:13px;text-decoration:none;font-weight:700}
.section-row a:hover{text-decoration:underline}

.sets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-bottom:20px}
.set-card{
  background:linear-gradient(180deg,rgba(255,255,255,0.8) 0%,rgba(255,255,255,0.6) 100%);
  border:1px solid rgba(200,195,230,0.6);
  border-radius:var(--r2);
  padding:22px;
  cursor:pointer;
  box-shadow:1px 1px 2px rgba(255,255,255,0.9) inset,-1px -1px 2px rgba(255,255,255,0.6) inset,0 2px 8px rgba(0,98,255,0.08);
  transition:all .25s var(--ease);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;will-change:transform;transform:translateZ(0)
}
.set-card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:1px 1px 2px rgba(255,255,255,0.95) inset,-1px -1px 2px rgba(255,255,255,0.8) inset,0 8px 24px rgba(0,98,255,0.15);
  background:linear-gradient(180deg,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0.85) 100%)
}
.set-card-title{font-size:17px;font-weight:800;margin-bottom:6px;letter-spacing:-0.3px}
.set-card-desc{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5;min-height:32px;flex:1}
.set-card-meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.set-card-actions{display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(180,170,210,0.3)}

.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.05),inset 1px 1px 0 rgba(255,255,255,0.8)}
.badge-purple{background:linear-gradient(135deg,rgba(0,98,255,0.15) 0%,rgba(0,98,255,0.1) 100%);color:#0062ff}
.badge-orange{background:linear-gradient(135deg,rgba(240,123,32,0.15) 0%,rgba(240,123,32,0.1) 100%);color:var(--orange)}
.badge-gray{background:linear-gradient(135deg,rgba(120,110,150,0.15) 0%,rgba(120,110,150,0.1) 100%);color:var(--text2)}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:2000;background:rgba(160,150,200,0.4);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;}
.modal-panel{background:rgba(252,250,255,0.99);border:1.5px solid rgba(200,195,230,0.8);border-radius:var(--r2);padding:28px;width:90%;max-width:860px;max-height:92vh;overflow-y:auto;box-shadow:0 16px 64px rgba(80,60,160,0.2);animation:slideUp .35s var(--ease2);transition:all .4s var(--ease2);}
.modal-panel h3{font-size:20px;font-weight:800;margin-bottom:16px;letter-spacing:-0.3px;display:flex;align-items:center;justify-content:space-between}
.modal-header-actions{display:flex;gap:4px}
.modal-header-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;background:rgba(0,98,255,0.08);border:none;cursor:pointer;border-radius:8px;color:var(--text2);transition:all .15s;font-size:16px}
.modal-header-btn:hover{background:rgba(0,98,255,0.15);color:var(--accent)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid rgba(180,170,210,0.2)}
.modal-bg.modal-maximized .modal-panel{width:98%;max-width:none;max-height:97vh;border-radius:var(--r)}
.modal-bg.modal-fullscreen .modal-panel{width:100%;max-width:none;height:100vh;max-height:100vh;border-radius:0;border:none}

#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(252,250,255,0.99);border:1px solid rgba(200,195,230,0.7);border-radius:var(--r);padding:12px 20px;font-size:14px;font-weight:700;box-shadow:0 8px 32px rgba(80,60,160,0.2);opacity:0;transform:translateY(12px);pointer-events:none;transition:all .25s var(--ease2);}
#toast.show{opacity:1;transform:translateY(0)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-hdr h3{font-size:20px;font-weight:800;letter-spacing:-0.3px}
.hidden{display:none!important}
.text-muted{color:var(--text2)}.text-sm{font-size:13px}

@media(max-width:700px){
  nav{padding:0 16px}
  .screen{padding:16px;margin-left:0}
  .sidebar{width:60px}
  .sidebar-btn{width:48px;height:48px;font-size:20px}
  .home-hero h1{font-size:32px}
  .two-col{grid-template-columns:1fr}
  .pair-row{grid-template-columns:26px 1fr 26px;grid-template-rows:auto auto}
  .pair-row .pair-col:nth-child(3){grid-column:2}
  .sets-grid{grid-template-columns:1fr}
}

.page{display:none}
.page.active{display:block}

.library-list{display:flex;flex-direction:column;gap:8px}
.library-item{
  background:linear-gradient(180deg,rgba(255,255,255,0.8) 0%,rgba(255,255,255,0.6) 100%);
  border:1px solid var(--glass-border);
  border-radius:var(--r);
  padding:16px;
  cursor:pointer;
  box-shadow:1px 1px 2px rgba(255,255,255,0.9) inset,-1px -1px 2px rgba(255,255,255,0.6) inset,0 2px 8px rgba(0,98,255,0.08);
  transition:all .2s;
  display:grid;
  grid-template-columns:1fr auto;
  gap:16px;
  align-items:center;
  will-change:transform;transform:translateZ(0)
}
.library-item:hover{transform:translateX(4px);box-shadow:1px 1px 2px rgba(255,255,255,0.95) inset,-1px -1px 2px rgba(255,255,255,0.8) inset,0 8px 24px rgba(0,98,255,0.15);background:linear-gradient(180deg,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0.85) 100%)}
.library-item-info h3{font-size:16px;font-weight:800;margin-bottom:4px}
.library-item-info p{font-size:13px;color:var(--text2);margin-bottom:6px}
.library-item-meta{display:flex;gap:8px;flex-wrap:wrap}

.vakken-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.vak-card{
  background:linear-gradient(135deg,rgba(0,98,255,0.1) 0%,rgba(0,98,255,0.05) 100%);
  border:1px solid rgba(0,98,255,0.2);
  border-radius:var(--r2);
  padding:24px;
  cursor:pointer;
  text-align:center;
  box-shadow:1px 1px 2px rgba(255,255,255,0.9) inset,-1px -1px 2px rgba(255,255,255,0.6) inset,0 2px 8px rgba(0,98,255,0.08);
  transition:all .25s;
  will-change:transform;transform:translateZ(0)
}
.vak-card:hover{transform:translateY(-8px) scale(1.05);box-shadow:1px 1px 2px rgba(255,255,255,0.95) inset,-1px -1px 2px rgba(255,255,255,0.8) inset,0 8px 24px rgba(0,98,255,0.15);background:linear-gradient(135deg,rgba(0,98,255,0.15) 0%,rgba(0,98,255,0.1) 100%)}

</style>

<script>
/* ══════════════════════════════════════════════════════
   OBFUSCATION / VSET
══════════════════════════════════════════════════════ */
const _k=['S','t','u','d','y','D','e','c','k','V','S','e','t','2','0','2','5'];
const VSET_KEY=_k.join('');
function xorStr(str,key){return str.split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^key.charCodeAt(i%key.length))).join('');}
function encodeVset(obj){const json=JSON.stringify(obj);return btoa(unescape(encodeURIComponent(xorStr(json,VSET_KEY))));}
function decodeVset(b64){return JSON.parse(xorStr(decodeURIComponent(escape(atob(b64))),VSET_KEY));}

/* ══════════════════════════════════════════════════════
   THEME MANAGEMENT
══════════════════════════════════════════════════════ */
const THEME_COLORS=[
  {hex:'#0062ff',idx:0},
  {hex:'#ff6b6b',idx:1},
  {hex:'#10b981',idx:2},
  {hex:'#f59e0b',idx:3},
  {hex:'#8b5cf6',idx:4}
];

function loadThemeSettings(){
  try{
    const saved=JSON.parse(localStorage.getItem('sd_theme')||'null');
    if(saved){
      applyThemeSettings(saved.darkMode,saved.accentColor);
      document.getElementById('theme-dark-toggle').checked=saved.darkMode;
      updateAccentColorUI(saved.accentColor);
    }
  }catch(e){}
}

function toggleDarkMode(){
  const isDark=document.getElementById('theme-dark-toggle').checked;
  const currentAccent=localStorage.getItem('sd_theme')?JSON.parse(localStorage.getItem('sd_theme')).accentColor:'#0062ff';
  saveThemeSettings(isDark,currentAccent);
  applyThemeSettings(isDark,currentAccent);
}

function setAccentColor(hex,idx){
  const isDark=document.getElementById('theme-dark-toggle').checked;
  saveThemeSettings(isDark,hex);
  applyThemeSettings(isDark,hex);
  updateAccentColorUI(hex);
}

function updateAccentColorUI(hex){
  document.querySelectorAll('[id^="accent-"]').forEach(btn=>{btn.style.borderColor='transparent';btn.style.boxShadow='none';});
  const idx=THEME_COLORS.findIndex(c=>c.hex===hex);
  if(idx>=0){const btn=document.getElementById('accent-'+idx);btn.style.borderColor='rgba(0,0,0,0.5)';btn.style.boxShadow='0 0 8px rgba(0,0,0,0.3)';}
}

function applyThemeSettings(darkMode,accentColor){
  const root=document.documentElement.style;
  if(darkMode){
    root.setProperty('--bg-grad','linear-gradient(180deg, rgb(10, 10, 10) 0%, rgb(10, 8, 18) 100%)');
    root.setProperty('--glass','rgb(34, 33, 41)');
    root.setProperty('--glass2','rgba(34,33,41,0.90)');
    root.setProperty('--text','#ffffff');
    root.setProperty('--text2','#e9e9e9');
    root.setProperty('--text3','rgba(255,255,255,0.65)');
    root.setProperty('--glass-border','rgba(64,73,112,0.557)');
    root.setProperty('--glass-shadow','0 0px 10px rgba(0,5,48,0.8), inset 1px 1px 0 rgba(88,93,120,0.9)');
    root.setProperty('--glass-shadow-lg','0 8px 32px rgba(0,5,48,0.8), inset 1px 1px 0 rgba(88,93,120,0.9)');
  }else{
    root.setProperty('--bg-grad','linear-gradient(160deg,#f0eef9 0%,#ddd8f0 50%,#cfc8e8 100%)');
    root.setProperty('--glass','rgba(255,255,255,0.90)');
    root.setProperty('--glass2','rgba(255,255,255,0.80)');
    root.setProperty('--text','#0b0f2a');
    root.setProperty('--text2','#3d3a55');
    root.setProperty('--text3','#7c7899');
    root.setProperty('--glass-border','rgba(200,195,230,0.6)');
    root.setProperty('--glass-shadow','0 2px 8px rgba(0,98,255,0.1),inset 1px 1px 0 rgba(255,255,255,1),inset -1px -1px 2px rgba(255,255,255,0.5)');
    root.setProperty('--glass-shadow-lg','0 8px 32px rgba(0,98,255,0.15),inset 1px 1px 0 rgba(255,255,255,1),inset -1px -1px 2px rgba(255,255,255,0.5)');
  }
  if(accentColor&&accentColor!=='#0062ff'){
    root.setProperty('--accent',accentColor);
    root.setProperty('--accent2',accentColor);
    const hex=accentColor.replace('#','');
    const r=parseInt(hex.substr(0,2),16);
    const g=parseInt(hex.substr(2,2),16);
    const b=parseInt(hex.substr(4,2),16);
    root.setProperty('--accent-light',`rgba(${r},${g},${b},0.12)`);
  }else{
    root.setProperty('--accent','#0062ff');
    root.setProperty('--accent2','#0075ff');
    root.setProperty('--accent-light','rgba(0,98,255,0.12)');
  }
}

function saveThemeSettings(darkMode,accentColor){
  localStorage.setItem('sd_theme',JSON.stringify({darkMode,accentColor}));
}

function toggleDD(id){
  const el=document.getElementById(id);
  if(!el)return;
  const isOpen=el.style.display==='block';
  document.querySelectorAll('[id$="-dd"]').forEach(d=>{d.style.display='none';});
  if(!isOpen)el.style.display='block';
}
document.addEventListener('click',(e)=>{
  if(e.target.closest('.settings-dropdown-wrap'))return;
  document.querySelectorAll('[id$="-dd"]').forEach(dd=>{dd.style.display='none';});
});

/* ══════════════════════════════════════════════════════
   DB
══════════════════════════════════════════════════════ */
let DB={sets:[]};
function initDB(){try{DB.sets=JSON.parse(localStorage.getItem('sd_sets')||'[]');}catch(e){DB.sets=[];}}
function saveDB(){try{localStorage.setItem('sd_sets',JSON.stringify(DB.sets));}catch(e){}}

async function loadSetsFromDirectory(){
  try{
    const indexResp=await fetch('sets/index.json');
    if(indexResp.ok){
      const fileList=await indexResp.json();
      for(const filename of fileList){
        try{
          const sr=await fetch('sets/'+encodeURIComponent(filename));
          if(sr.ok){
            const content=await sr.text();
            let set=null;
            try{set=decodeVset(content.trim());}catch{try{set=JSON.parse(content.trim());}catch(e){}}
            if(set&&set.title){
              set._serverFile=filename;
              if(!set.id)set.id='srv_'+filename;
              if(!set.slug)set.slug=toSlug(set.title);
              if(!set.terms)set.terms=[];
              set.fromServer=true;
              const existIdx=DB.sets.findIndex(x=>x._serverFile===filename);
              if(existIdx>=0){
                DB.sets[existIdx]=set;
              }else{
                DB.sets.push(set);
              }
            }
          }
        }catch(e){}
      }
    }
  }catch(e){}
}

/* ══════════════════════════════════════════════════════
   HOMEPAGE & NAVIGATION
══════════════════════════════════════════════════════ */
let currentPage = 'home';
let libraryFilter = 'all';
let searchQuery = '';

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sidebar-btn').forEach((b, i) => {
    if ((i === 0 && page === 'home') || (i === 1 && page === 'library') || (i === 2 && page === 'vakken')) {
      b.classList.add('active');
    }
  });
  if (page === 'library') renderLibrary();
  else if (page === 'vakken') renderVakken();
  else if (page === 'home') renderHome();
}

function getWeekNumber(d = new Date()) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
  return weekNum;
}

function renderHome(){
  const today = new Date();
  const opts = {weekday:'long', year:'numeric', month:'long', day:'numeric'};
  document.getElementById('today-date').textContent = today.toLocaleDateString('nl-NL', opts).split(',')[0];
  document.getElementById('week-number').textContent = `Week ${getWeekNumber(today)}`;
  
  const recentKey = 'sd_recent_sets';
  let recent = [];
  try { recent = JSON.parse(localStorage.getItem(recentKey) || '[]'); } catch(e) {}
  recent = recent.filter(id => DB.sets.find(s => s.id === id)).slice(0, 3);
  
  const recentSets = recent.map(id => DB.sets.find(s => s.id === id)).filter(Boolean);
  if (recentSets.length) {
    document.getElementById('section-recent').style.display = 'block';
    renderSetGrid('recent-grid', recentSets);
  }
  
  const recommended = DB.sets.filter(s => s.vak).sort(() => Math.random() - 0.5).slice(0, 3);
  if (recommended.length) renderSetGrid('recommended-grid', recommended);
  
  const newest = [...DB.sets].sort((a, b) => (b.id || '').localeCompare(a.id || '')).slice(0, 3);
  if (newest.length) renderSetGrid('newest-grid', newest);
}

function renderSetGrid(elementId, sets) {
  const el = document.getElementById(elementId);
  if (!el || !sets.length) return;
  el.innerHTML = sets.map(s => `
    <div class="set-card" onclick="openSet('${s.id}')">
      <div class="set-card-title">${esc(s.title)}</div>
      <div class="set-card-desc">${esc(s.description||'')}</div>
      <div class="set-card-meta">
        <span class="badge badge-purple">${s.terms.length} begrippen</span>
        ${s.vak?`<span class="badge badge-orange">${esc(s.vak)}</span>`:''}
        ${s.datum?`<span style="font-size:11px;color:var(--text3)">${s.datum}</span>`:''}
      </div>
      <div class="set-card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-glass btn-sm" onclick="openSet('${s.id}')">Oefenen</button>
        ${!s.fromServer?`<button class="btn btn-glass btn-sm" onclick="showCreateModal('${s.id}')">Bewerken</button>`:''}
        ${!s.fromServer?`<button class="btn btn-sm" style="background:rgba(232,58,74,0.1);color:var(--red);border:none;border-radius:8px;padding:6px 10px;font-family:var(--font);font-weight:700;cursor:pointer" onclick="confirmDelete('${s.id}')">✕</button>`:''}
      </div>
    </div>
  `).join('');
}

function renderLibrary() {
  const vakken = [...new Set(DB.sets.map(s => s.vak).filter(Boolean))];
  const vakkenContainer = document.getElementById('lib-filter-vakken');
  if (vakkenContainer) {
    vakkenContainer.innerHTML = vakken.map(v => 
      `<button class="btn btn-glass btn-sm" onclick="filterLibrary('${esc(v)}')" id="lib-filter-${esc(v)}" style="border-radius:20px">${esc(v)}</button>`
    ).join('');
  }
  
  let sets = [...DB.sets];
  if (libraryFilter !== 'all') {
    sets = sets.filter(s => s.vak === libraryFilter);
  }
  if (searchQuery) {
    sets = sets.filter(s => 
      s.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
      (s.vak && s.vak.toLowerCase().includes(searchQuery.toLowerCase()))
    );
  }
  sets.sort((a, b) => (b.id || '').localeCompare(a.id || ''));
  
  const el = document.getElementById('library-list');
  if (!el) return;
  el.innerHTML = sets.map(s => `
    <div class="library-item" onclick="openSet('${s.id}')">
      <div class="library-item-info">
        <h3>${esc(s.title)}</h3>
        <p>${esc(s.description || 'Geen omschrijving')}</p>
        <div class="library-item-meta">
          <span class="badge badge-purple">${s.terms.length} begrippen</span>
          ${s.vak?`<span class="badge badge-orange">${esc(s.vak)}</span>`:''}
        </div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openSet('${s.id}')">Oefenen →</button>
    </div>
  `).join('') || '<div style="text-align:center;padding:40px;color:var(--text2)">Geen sets gevonden</div>';
}

function renderVakken() {
  const vakken = [...new Set(DB.sets.map(s => s.vak).filter(Boolean))].sort();
  const el = document.getElementById('vakken-grid');
  el.innerHTML = vakken.map(v => {
    const count = DB.sets.filter(s => s.vak === v).length;
    return `
      <div class="vak-card" onclick="goToVakLibrary('${esc(v)}')">
        <div class="vak-card-title">${esc(v)}</div>
        <div class="vak-card-count">${count}</div>
        <div class="vak-card-desc">sets om te oefenen</div>
      </div>
    `;
  }).join('');
}

function goToVakLibrary(vak) {
  showPage('library');
  libraryFilter = vak;
  filterLibrary(vak);
}

function filterLibrary(filter) {
  libraryFilter = filter;
  document.querySelectorAll('[id^="lib-filter-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('lib-filter-' + filter).classList.add('active');
  renderLibrary();
}



function openSet(id){
  const s=DB.sets.find(x=>x.id===id);if(!s)return;
  const slug=s.slug||toSlug(s.title);s.slug=slug;saveDB();
  const recentKey='sd_recent_sets';
  let recent=[];try{recent=JSON.parse(localStorage.getItem(recentKey)||'[]');}catch(e){}
  recent=recent.filter(r=>r!==id);recent.unshift(id);recent=recent.slice(0,10);
  localStorage.setItem(recentKey,JSON.stringify(recent));
  window.location.href=`set.html?set=${encodeURIComponent(slug)}`;
}

function setupSearch(){
  const searchBox=document.getElementById('search-box');
  if(!searchBox)return;
  
  // Create search results dropdown
  const dropdown=document.createElement('div');
  dropdown.id='search-dropdown';
  dropdown.style.cssText='position:fixed;top:52px;background:rgba(255,255,255,0.95);border:1px solid rgba(0,98,255,0.2);border-radius:12px;box-shadow:0 4px 24px rgba(0,98,255,0.15);max-height:400px;overflow-y:auto;z-index:300;display:none;backdrop-filter:blur(10px)';
  document.body.appendChild(dropdown);
  
  const updateDropdownPosition = () => {
    const rect = searchBox.getBoundingClientRect();
    dropdown.style.left = rect.left + 'px';
    dropdown.style.top = (rect.bottom + 8) + 'px';
    dropdown.style.width = rect.width + 'px';
  };
  
  searchBox.addEventListener('input',(e)=>{
    const query=e.target.value.trim().toLowerCase();
    searchQuery=query;
    
    if(!query){
      dropdown.style.display='none';
      return;
    }
    
    // Secret feature: type 'developer' to go to developer.html
    if(query==='dev'){
      dropdown.innerHTML='<div style="padding:16px;text-align:center;color:var(--text2);font-size:14px">Geen resultaten gevonden</div>';
      updateDropdownPosition();
      dropdown.style.display='block';
      return;
    }
    
    let results=DB.sets.filter(s=>
      s.title.toLowerCase().includes(query)||
      (s.vak&&s.vak.toLowerCase().includes(query))||
      (s.datum&&s.datum.includes(query))
    );
    
    if(results.length===0){
      dropdown.innerHTML='<div style="padding:16px;text-align:center;color:var(--text2);font-size:14px">Geen resultaten gevonden</div>';
      updateDropdownPosition();
      dropdown.style.display='block';
      return;
    }
    
    updateDropdownPosition();
    dropdown.innerHTML=results.slice(0,8).map(s=>`
      <div style="padding:12px 16px;border-bottom:1px solid rgba(0,98,255,0.1);cursor:pointer;transition:all .2s" onmouseover="this.style.background='rgba(0,98,255,0.05)'" onmouseout="this.style.background=''" onclick="openSet('${s.id}');document.getElementById('search-dropdown').style.display='none';document.getElementById('search-box').value=''">
        <div style="font-weight:800;font-size:14px;color:var(--text)">${esc(s.title)}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:3px">${s.vak?'<span style="margin-right:8px">'+esc(s.vak)+'</span>':''}${s.terms.length} begrippen</div>
      </div>
    `).join('')+(results.length>8?'<div style="padding:8px;text-align:center;font-size:12px;color:var(--text3)">+${results.length-8} meer...</div>':'');
    dropdown.style.display='block';
  });
  
  searchBox.addEventListener('focus',()=>{
    if(searchBox.value.trim()){
      updateDropdownPosition();
      dropdown.style.display='block';
    }
  });
  
  searchBox.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'){
      const query=searchBox.value.trim().toLowerCase();
      if(query==='dev'){
        window.location.href='developer.html';
      }
    }
  });
  
  window.addEventListener('scroll',()=>{
    if(dropdown.style.display==='block'){
      updateDropdownPosition();
    }
  });
  
  document.addEventListener('click',(e)=>{
    if(!searchBox.contains(e.target)&&!dropdown.contains(e.target)){
      dropdown.style.display='none';
    }
  });
}
function toSlug(str){
  return str.toLowerCase()
    .replace(/[àáâäãåā]/g,'a').replace(/[èéêëē]/g,'e').replace(/[ìíîïī]/g,'i')
    .replace(/[òóôöõøō]/g,'o').replace(/[ùúûüū]/g,'u').replace(/[ñ]/g,'n')
    .replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').replace(/-+/g,'-').slice(0,60)||'set-'+Date.now();
}

/* ══════════════════════════════════════════════════════
   RICH TEXT EDITOR ENGINE
   
   Philosophy:
   - Each pair cell is a contenteditable div
   - We use execCommand (still works in all browsers) for bold/italic/color
   - We save the innerHTML as the formatted content and strip tags for plain text
   - On load, we restore innerHTML so the user sees formatting in the field
══════════════════════════════════════════════════════ */

const COLORS = [
  {hex:'#0b0f2a', label:'Zwart'},
  {hex:'#e83a4a', label:'Rood'},
  {hex:'#0062ff', label:'Blauw'},
  {hex:'#18b672', label:'Groen'},
  {hex:'#f07b20', label:'Oranje'},
  {hex:'#9333ea', label:'Paars'},
  {hex:'#db2777', label:'Roze'},
  {hex:'#0891b2', label:'Cyaan'},
];

// Track which cell currently has the toolbar visible
let _activeFmtBar = null;
let _savedRange = null; // saved selection before toolbar button mousedown

/** Save the current selection so we can restore it after a toolbar click */
function saveSelection() {
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    _savedRange = sel.getRangeAt(0).cloneRange();
  }
}

/** Restore saved selection into the given element */
function restoreSelection(el) {
  el.focus();
  if (!_savedRange) return;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(_savedRange);
}

/** Apply execCommand formatting, restoring selection first */
function applyCmd(editorEl, cmd, value=null) {
  restoreSelection(editorEl);
  document.execCommand(cmd, false, value);
  editorEl.focus();
  syncPairFromEditor(editorEl);
  updateToolbarState(editorEl);
}

/** Get plain text from HTML */
function htmlToPlain(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

/** Update active states of toolbar buttons based on cursor position */
function updateToolbarState(editorEl) {
  const barId = editorEl.dataset.barId;
  const bar = document.getElementById(barId);
  if (!bar) return;

  const isBold = document.queryCommandState('bold');
  const isItalic = document.queryCommandState('italic');

  bar.querySelector('[data-cmd="bold"]')?.classList.toggle('active', isBold);
  bar.querySelector('[data-cmd="italic"]')?.classList.toggle('active', isItalic);

  // Highlight current foreColor swatch
  bar.querySelectorAll('.color-swatch').forEach(sw => {
    sw.classList.remove('active');
  });
  // (foreColor is tricky to query — skip for now, selection-based)
}

/** Read innerHTML back into CE.pairs */
function syncPairFromEditor(editorEl) {
  const idx = parseInt(editorEl.dataset.idx);
  const field = editorEl.dataset.field; // 'term' or 'def'
  const pair = CE.pairs[idx];
  if (!pair) return;
  const html = editorEl.innerHTML;
  const plain = htmlToPlain(html);
  if (field === 'term') {
    pair.term = plain;
    pair.termHtml = html;
  } else {
    pair.def = plain;
    pair.defHtml = html;
  }
  ceSaveDraft();
}

/** Show/hide toolbar for the focused editor */
function onEditorFocus(editorEl) {
  const barId = editorEl.dataset.barId;
  const bar = document.getElementById(barId);
  if (bar) {
    bar.classList.add('visible');
    _activeFmtBar = bar;
  }
  updateToolbarState(editorEl);
}

function onEditorBlur(editorEl, e) {
  // Delay so toolbar button clicks can fire first
  setTimeout(() => {
    const barId = editorEl.dataset.barId;
    const bar = document.getElementById(barId);
    if (!bar) return;
    // If focus moved to the bar itself or one of its children, keep visible
    if (bar.contains(document.activeElement)) return;
    bar.classList.remove('visible');
    if (_activeFmtBar === bar) _activeFmtBar = null;
  }, 180);
}

/** Build a single pair row HTML — no inline event handlers on the editor itself,
    we bind via JS after insertion */
function buildPairRowHTML(i, p) {
  const termBarId = `bar-term-${i}`;
  const defBarId  = `bar-def-${i}`;
  const termEdId  = `ed-term-${i}`;
  const defEdId   = `ed-def-${i}`;

  const termHtml = p.termHtml || esc(p.term || '');
  const defHtml  = p.defHtml  || esc(p.def  || '');

  return `
    <div class="pair-row" id="pr-${i}">
      <div class="pair-num">${i+1}</div>

      <!-- TERM column -->
      <div class="pair-col">
        <div
          class="rich-editor"
          id="${termEdId}"
          contenteditable="true"
          data-placeholder="Begrip"
          data-idx="${i}"
          data-field="term"
          data-bar-id="${termBarId}"
          spellcheck="true"
        >${termHtml}</div>
        ${buildToolbarHTML(termBarId, termEdId)}
        ${buildImageGallery(i, p)}
      </div>

      <!-- DEF column -->
      <div class="pair-col">
        <div
          class="rich-editor"
          id="${defEdId}"
          contenteditable="true"
          data-placeholder="Definitie"
          data-idx="${i}"
          data-field="def"
          data-bar-id="${defBarId}"
          spellcheck="true"
        >${defHtml}</div>
        ${buildToolbarHTML(defBarId, defEdId)}
      </div>

      <button class="pair-del" onclick="ceRemove(${i})">×</button>
    </div>
  `;
}

function buildToolbarHTML(barId, edId) {
  const swatches = COLORS.map(c =>
    `<div class="color-swatch" style="background:${c.hex}" title="${c.label}"
      data-color="${c.hex}" data-editor="${edId}"></div>`
  ).join('');

  return `
    <div class="fmt-bar" id="${barId}">
      ${swatches}
      <div class="fmt-sep"></div>
      <button class="fmt-btn" data-cmd="bold" data-editor="${edId}" title="Vet (Ctrl+B)"><b>B</b></button>
      <button class="fmt-btn" data-cmd="italic" data-editor="${edId}" title="Cursief (Ctrl+I)"><i>I</i></button>
      <div class="fmt-sep"></div>
      <button class="fmt-clear" data-editor="${edId}" title="Verwijder alle opmaak">✕ Opmaak wissen</button>
      <button class="img-upload-btn" data-upload="${edId}" style="margin-left:auto">🖼️ Afb.</button>
    </div>
  `;
}

function buildImageGallery(i, p) {
  if (!p.images || !p.images.length) return '';
  return `<div class="image-gallery">${p.images.map((img,j) =>
    `<img src="data:image/png;base64,${img.base64}" class="image-thumb"
      onclick="ceRemoveImage(${i},${j})" title="Klik om te verwijderen">`
  ).join('')}</div>`;
}

/** After inserting pair rows into DOM, bind all events */
function bindPairEvents(container) {
  // ── Editor focus/blur/input/keydown ──
  container.querySelectorAll('.rich-editor').forEach(ed => {
    ed.addEventListener('focus', () => onEditorFocus(ed));
    ed.addEventListener('blur',  (e) => onEditorBlur(ed, e));
    ed.addEventListener('input', () => { saveSelection(); syncPairFromEditor(ed); updateToolbarState(ed); });
    ed.addEventListener('keyup', () => { updateToolbarState(ed); });
    ed.addEventListener('mouseup', () => { saveSelection(); updateToolbarState(ed); });
    ed.addEventListener('keydown', (e) => {
      // Ctrl+B / Ctrl+I shortcuts
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'b' || e.key === 'B') { e.preventDefault(); saveSelection(); applyCmd(ed, 'bold'); }
        if (e.key === 'i' || e.key === 'I') { e.preventDefault(); saveSelection(); applyCmd(ed, 'italic'); }
      }
      // Tab → jump to next editor
      if (e.key === 'Tab') {
        e.preventDefault();
        const all = [...container.querySelectorAll('.rich-editor')];
        const cur = all.indexOf(ed);
        const next = all[cur + 1];
        if (next) { next.focus(); const r = document.createRange(); r.selectNodeContents(next); r.collapse(false); const s = window.getSelection(); s.removeAllRanges(); s.addRange(r); }
        else { ceAdd(); } // Tab on last field → add new pair
      }
    });
  });

  // ── Toolbar buttons (bold/italic) ──
  container.querySelectorAll('.fmt-btn[data-cmd]').forEach(btn => {
    btn.addEventListener('mousedown', (e) => {
      e.preventDefault(); // don't steal focus
      const ed = document.getElementById(btn.dataset.editor);
      if (!ed) return;
      saveSelection();
      applyCmd(ed, btn.dataset.cmd);
    });
  });

  // ── Color swatches ──
  container.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const ed = document.getElementById(sw.dataset.editor);
      if (!ed) return;
      saveSelection();
      applyCmd(ed, 'foreColor', sw.dataset.color);
    });
  });

  // ── Clear formatting ──
  container.querySelectorAll('.fmt-clear').forEach(btn => {
    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const ed = document.getElementById(btn.dataset.editor);
      if (!ed) return;
      restoreSelection(ed);
      // Select all if nothing selected
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed) {
        document.execCommand('selectAll', false, null);
      }
      document.execCommand('removeFormat', false, null);
      ed.focus();
      syncPairFromEditor(ed);
      updateToolbarState(ed);
    });
  });

  // ── Image upload ──
  container.querySelectorAll('[data-upload]').forEach(btn => {
    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const edId = btn.dataset.upload;
      // Extract pair index from editor id: ed-term-2 → 2
      const match = edId.match(/ed-(?:term|def)-(\d+)/);
      if (match) ceUploadImage(parseInt(match[1]));
    });
  });
}

/* ══════════════════════════════════════════════════════
   CREATE / EDIT MODAL
══════════════════════════════════════════════════════ */
let CE = { id: null, pairs: [], viewMode: 0 }; // 0: klein, 1: breed, 2: volledig

function showCreateModal(id) {
  CE.id = id || null;
  CE.viewMode = 0;
  let s = id ? DB.sets.find(x => x.id === id) : null;

  if (!id) {
    const draft = JSON.parse(localStorage.getItem('sd_draft') || 'null');
    if (draft) {
      s = {
        title: draft.title || '',
        vak: draft.vak || '',
        description: draft.desc || '',
        datum: draft.datum || '',
        terms: draft.pairs || []
      };
      setTimeout(() => showToast('📋 Concept hersteld!'), 100);
    }
  }

  CE.pairs = s
    ? s.terms.map(t => ({ ...t }))
    : [{ term:'', def:'' }, { term:'', def:'' }];

  showModal(`
    <h3>
      <span>${id ? 'Set bewerken' : 'Nieuwe set'}</span>
      <div class="modal-header-actions">
        <button class="modal-header-btn" onclick="toggleMaximize()" title="Maximaliseer">↗</button>
      </div>
    </h3>
    <div class="two-col" style="margin-bottom:12px">
      <div class="input-group"><label>Titel *</label><input id="c-title" type="text" placeholder="Bijv. Biologie H3" value="${esc(s?.title||'')}" oninput="ceSaveDraft()"></div>
      <div class="input-group"><label>Vak</label><input id="c-vak" type="text" placeholder="Bijv. Wiskunde" value="${esc(s?.vak||'')}" oninput="ceSaveDraft()"></div>
    </div>
    <div class="two-col" style="margin-bottom:16px">
      <div class="input-group"><label>Omschrijving</label><textarea id="c-desc" style="min-height:56px" oninput="ceSaveDraft()">${esc(s?.description||'')}</textarea></div>
      <div class="input-group"><label>Datum</label><input id="c-datum" type="date" value="${esc(s?.datum||'')}" oninput="ceSaveDraft()"></div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div style="font-size:15px;font-weight:800">Begrippen
        <span style="font-size:12px;color:var(--text3);font-weight:600;margin-left:8px">
          Selecteer tekst → kies kleur of opmaak in de toolbar
        </span>
      </div>
      <button class="btn btn-glass btn-sm" onclick="ceAdd()">+ Toevoegen</button>
    </div>

    <div style="display:grid;grid-template-columns:28px 1fr 1fr 28px;gap:8px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(180,170,210,0.2)">
      <div></div>
      <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Begrip / Term</div>
      <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Definitie</div>
      <div></div>
    </div>

    <div id="ce-pairs" style="max-height:360px;overflow-y:auto;padding-right:2px"></div>
    <button class="btn btn-glass" style="width:100%;margin-top:8px" onclick="ceAdd()">+ Begrip toevoegen</button>

    <div class="modal-footer">
      <button class="btn btn-sm" style="background:rgba(232,58,74,0.1);color:var(--red);margin-right:auto" onclick="ceClearDraft()">Concept verwijderen</button>
      <button class="btn btn-glass" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="ceSave()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        ${id ? 'Opslaan' : 'Aanmaken'}
      </button>
    </div>
  `);

  ceRenderPairs();
}

function toggleMaximize() {
  CE.viewMode = (CE.viewMode + 1) % 3;
  const bg = document.getElementById('modal-bg');
  const btn = document.querySelector('.modal-header-btn');
  
  bg.classList.remove('modal-maximized', 'modal-fullscreen');

  if (CE.viewMode === 1) {
    bg.classList.add('modal-maximized');
    if (btn) btn.textContent = '⬜'; 
  } else if (CE.viewMode === 2) {
    bg.classList.add('modal-fullscreen');
    if (btn) btn.textContent = '↘'; 
  } else {
    if (btn) btn.textContent = '↗'; 
  }
}

function ceRenderPairs() {
  const container = document.getElementById('ce-pairs');
  if (!container) return;

  // Build all rows
  container.innerHTML = CE.pairs.map((p, i) => buildPairRowHTML(i, p)).join('');

  // Bind all events
  bindPairEvents(container);
}

function ceSaveDraft() {
  if (CE.id) return;
  const draft = {
    title: document.getElementById('c-title')?.value || '',
    vak: document.getElementById('c-vak')?.value || '',
    desc: document.getElementById('c-desc')?.value || '',
    datum: document.getElementById('c-datum')?.value || '',
    pairs: CE.pairs
  };
  localStorage.setItem('sd_draft', JSON.stringify(draft));
}

function ceClearDraft() {
  if (!confirm('Weet je zeker dat je alle velden wilt leegmaken?')) return;
  localStorage.removeItem('sd_draft');
  CE.pairs = [{ term:'', def:'' }, { term:'', def:'' }];
  document.getElementById('c-title').value = '';
  document.getElementById('c-vak').value = '';
  document.getElementById('c-desc').value = '';
  ceRenderPairs();
}

function ceAdd() {
  CE.pairs.push({ term:'', def:'', termHtml:'', defHtml:'' });
  ceSaveDraft();
  ceRenderPairs();
  // Scroll to bottom and focus new term editor
  const container = document.getElementById('ce-pairs');
  if (container) {
    container.scrollTop = container.scrollHeight;
    setTimeout(() => {
      const eds = container.querySelectorAll('.rich-editor[data-field="term"]');
      const last = eds[eds.length - 1];
      if (last) last.focus();
    }, 60);
  }
}

function ceRemove(i) {
  if (CE.pairs.length <= 1) { showToast('Minimaal 1 begrip vereist'); return; }
  CE.pairs.splice(i, 1);
  ceSaveDraft();
  ceRenderPairs();
}

function ceUploadImage(idx) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 500000) { showToast('Afbeelding te groot (max 500KB)'); return; }
    const reader = new FileReader();
    reader.onload = evt => {
      const b64 = evt.target.result.split(',')[1];
      const pair = CE.pairs[idx];
      if (!pair.images) pair.images = [];
      if (pair.images.length >= 3) { showToast('Max 3 afbeeldingen per begrip'); return; }
      pair.images.push({ id:'img_'+Date.now(), base64:b64 });
      ceSaveDraft();
      ceRenderPairs();
      showToast('✓ Afbeelding toegevoegd!');
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function ceRemoveImage(idx, imgIdx) {
  const pair = CE.pairs[idx];
  if (pair.images) { pair.images.splice(imgIdx, 1); ceSaveDraft(); ceRenderPairs(); showToast('Afbeelding verwijderd'); }
}

function ceSave() {
  const title = document.getElementById('c-title').value.trim();
  if (!title) { showToast('Vul een titel in'); return; }

  // Sync all editors one last time before saving
  document.querySelectorAll('#ce-pairs .rich-editor').forEach(ed => syncPairFromEditor(ed));

  const terms = CE.pairs
    .filter(p => p.term.trim() || p.def.trim())
    .map(p => {
      const t = { term: p.term.trim(), def: p.def.trim() };
      // Preserve rich HTML (only if it differs from plain text, i.e., has formatting)
      if (p.termHtml && p.termHtml !== esc(p.term)) t.termHtml = p.termHtml;
      if (p.defHtml  && p.defHtml  !== esc(p.def))  t.defHtml  = p.defHtml;
      if (p.images) t.images = p.images;
      return t;
    });

  if (!terms.length) { showToast('⚠️ Voeg minimaal 1 begrip toe'); return; }

  const existing = CE.id ? DB.sets.find(x => x.id === CE.id) : null;
  const slug = existing?.slug || toSlug(title);
  const set = {
    id: CE.id || 'set_'+Date.now(),
    slug, title,
    description: document.getElementById('c-desc').value.trim(),
    vak: document.getElementById('c-vak').value.trim(),
    datum: document.getElementById('c-datum').value,
    terms
  };

  if (CE.id) {
    const idx = DB.sets.findIndex(x => x.id === CE.id);
    if (idx > -1) DB.sets[idx] = set;
  } else {
    DB.sets.unshift(set);
  }

  saveDB();
  localStorage.removeItem('sd_draft');
  closeModal();
  renderHome();
  showToast(CE.id ? '✓ Set opgeslagen!' : '✓ Set aangemaakt!');
}

/* ══════════════════════════════════════════════════════
   DELETE
══════════════════════════════════════════════════════ */
function confirmDelete(id) {
  const s = DB.sets.find(x => x.id === id);
  if (!s) return;
  if (s.fromServer) { showToast('Server-sets kunnen niet verwijderd worden'); return; }
  showModal(`
    <h3>Set verwijderen?</h3>
    <p style="color:var(--text2);margin-bottom:20px">Dit kan niet ongedaan worden gemaakt.</p>
    <div class="modal-footer">
      <button class="btn btn-glass" onclick="closeModal()">Annuleren</button>
      <button class="btn" style="background:var(--red);color:#fff;border:none;border-radius:var(--r3);padding:9px 18px;font-family:var(--font);font-weight:700;cursor:pointer" onclick="doDelete('${id}')">Verwijderen</button>
    </div>
  `);
}
function doDelete(id) { DB.sets = DB.sets.filter(s => s.id !== id); saveDB(); closeModal(); renderHome(); showToast('Set verwijderd'); }

/* ══════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════ */
function showModal(html) {
  document.getElementById('modal-panel').innerHTML = html;
  document.getElementById('modal-bg').classList.remove('hidden');
}
function closeModal() {
  CE.viewMode = 0;
  document.getElementById('modal-bg').classList.add('hidden');
  document.getElementById('modal-bg').classList.remove('modal-maximized', 'modal-fullscreen');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ══════════════════════════════════════════════════════
   TOAST / UTIL
══════════════════════════════════════════════════════ */
let _tt;
function showToast(msg) { const t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2800); }
function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ══════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════ */
loadThemeSettings();
initDB();
loadSetsFromDirectory().then(() => { renderHome(); setupSearch(); });

window.debugDb = function(){
  console.log('Sets in memory:', DB.sets.length, DB.sets);
  return DB.sets;
};
