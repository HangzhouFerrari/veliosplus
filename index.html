<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyDeck</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-grad:linear-gradient(160deg,#f0eef9 0%,#ddd8f0 50%,#cfc8e8 100%);
  --glass:rgba(255,255,255,0.90);
  --glass2:rgba(255,255,255,0.80);
  --glass-border:rgba(200,195,230,0.6);
  --glass-shadow:0 4px 24px rgba(80,60,160,0.10),inset 1px 1px 0 rgba(255,255,255,1);
  --glass-shadow-lg:0 8px 40px rgba(80,60,160,0.14),inset 1px 1px 0 rgba(255,255,255,1);
  --text:#0b0f2a;--text2:#3d3a55;--text3:#7c7899;
  --accent:#4255ff;--accent2:#6b7bff;--accent-light:rgba(66,85,255,0.12);
  --green:#18b672;--red:#e83a4a;--orange:#f07b20;
  --r:20px;--r2:28px;--r3:14px;--r4:10px;
  --font:'DM Sans',sans-serif;
  --ease:cubic-bezier(0,0,.47,1.15);
  --ease2:cubic-bezier(0.34,1.56,0.64,1);
}
html{min-height:100vh;font-family:var(--font);color:var(--text);font-size:16px;overflow-x:hidden}
body{min-height:100vh;background:var(--bg-grad);background-attachment:fixed}

nav{
  position:sticky;top:0;z-index:200;
  background:rgba(240,238,249,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(200,195,230,0.5);
  padding:0 28px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
.nav-logo-icon{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#4255ff,#6b7bff);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 10px rgba(66,85,255,0.35);}
.nav-actions{display:flex;gap:8px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--r3);cursor:pointer;font-family:var(--font);font-size:14px;font-weight:700;padding:9px 18px;transition:all .2s var(--ease);outline:none;white-space:nowrap;}
.btn-primary{background:linear-gradient(180deg,#4255ff 0%,rgba(66,85,255,0.85) 100%);color:#fff;box-shadow:0 2px 12px rgba(66,85,255,0.35),inset 1px 1px 0 rgba(255,255,255,0.25);}
.btn-primary:hover{filter:brightness(1.15);transform:scale(1.04) translateY(-1px)}
.btn-glass{background:linear-gradient(180deg,rgba(255,255,255,0.9) 0%,rgba(255,255,255,0.75) 100%);color:var(--text);box-shadow:inset 1px 1px 0 rgba(255,255,255,1),0 2px 8px rgba(80,60,160,0.1);border:none;}
.btn-glass:hover{background:rgba(255,255,255,0.95);transform:scale(1.04)}
.btn-glass:active,.btn-primary:active{transform:scale(0.97)}
.btn-lg{padding:13px 26px;font-size:16px;border-radius:var(--r)}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:var(--r4)}
.btn-icon{width:40px;height:40px;padding:0;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(255,255,255,0.9) 0%,rgba(255,255,255,0.75) 100%);box-shadow:inset 1px 1px 0 rgba(255,255,255,1),0 2px 8px rgba(80,60,160,0.1);border:none;border-radius:12px;cursor:pointer;}
.btn-icon:hover{background:rgba(255,255,255,0.95);transform:scale(1.08)}

input,textarea,select{background:rgba(255,255,255,0.85);border:1px solid rgba(200,195,230,0.6);border-radius:var(--r3);color:var(--text);font-family:var(--font);font-size:15px;padding:11px 16px;outline:none;transition:all .2s;width:100%;box-shadow:inset 1px 1px 0 rgba(255,255,255,1),0 2px 6px rgba(80,60,160,0.06);}
input:focus,textarea:focus,select:focus{border-color:#4255ff;background:rgba(255,255,255,0.98);box-shadow:0 0 0 3px rgba(66,85,255,0.12),inset 1px 1px 0 rgba(255,255,255,1);}
textarea{resize:vertical;min-height:72px;line-height:1.5}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-group label{font-size:13px;color:var(--text2);font-weight:600}

.screen{padding:28px 32px;max-width:1100px;margin:0 auto;width:100%}

@keyframes pageIn{from{opacity:0;transform:scale(0.94) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.page-enter{animation:pageIn .4s var(--ease2) both}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.home-hero{text-align:center;padding:40px 0 28px}
.home-hero h1{font-size:46px;font-weight:800;line-height:1.1;letter-spacing:-1.5px;margin-bottom:10px}
.home-hero h1 span{background:linear-gradient(135deg,#4255ff 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-hero p{color:var(--text2);font-size:17px;max-width:440px;margin:0 auto 28px}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

.sets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-top:20px}
.set-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r2);padding:22px;cursor:pointer;box-shadow:var(--glass-shadow);transition:all .25s var(--ease);position:relative;overflow:hidden;}
.set-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4255ff,#6b7bff);transform:scaleX(0);transform-origin:left;transition:.3s var(--ease)}
.set-card:hover{transform:translateY(-4px) scale(1.01);box-shadow:var(--glass-shadow-lg)}
.set-card:hover::after{transform:scaleX(1)}
.set-card-title{font-size:17px;font-weight:800;margin-bottom:6px;letter-spacing:-0.3px}
.set-card-desc{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5;min-height:32px}
.set-card-meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.set-card-actions{display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(180,170,210,0.3)}

.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700}
.badge-purple{background:rgba(66,85,255,0.12);color:#4255ff}
.badge-orange{background:rgba(240,123,32,0.12);color:var(--orange)}
.badge-gray{background:rgba(120,110,150,0.12);color:var(--text2)}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:2000;background:rgba(160,150,200,0.4);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;}
.modal-panel{background:rgba(252,250,255,0.99);border:1.5px solid rgba(200,195,230,0.8);border-radius:var(--r2);padding:28px;width:90%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 64px rgba(80,60,160,0.2);animation:slideUp .35s var(--ease2);}
.modal-panel h3{font-size:20px;font-weight:800;margin-bottom:16px;letter-spacing:-0.3px;display:flex;align-items:center;justify-content:space-between}
.modal-header-actions{display:flex;gap:4px}
.modal-header-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;background:rgba(66,85,255,0.08);border:none;cursor:pointer;border-radius:8px;color:var(--text2);transition:all .15s;font-size:16px}
.modal-header-btn:hover{background:rgba(66,85,255,0.15);color:var(--accent)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid rgba(180,170,210,0.2)}
/* Maximized modal */
.modal-bg.modal-maximized{background:rgba(160,150,200,0.5)}
.modal-bg.modal-maximized .modal-panel{width:95%;max-width:none;max-height:96vh;border-radius:var(--r)}

/* Pair rows */
.pair-row{display:grid;grid-template-columns:30px 1fr 1fr 28px;gap:8px;align-items:start;margin-bottom:12px;padding:8px;background:rgba(255,255,255,0.4);border-radius:6px}
.pair-num{width:28px;height:28px;border-radius:50%;background:rgba(66,85,255,0.1);color:#4255ff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:2px}
.pair-del{width:26px;height:26px;border-radius:50%;background:none;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;margin-top:2px}
.pair-del:hover{color:var(--red);background:rgba(232,58,74,0.1)}
/* Formatting toolbar */
.format-toolbar{display:none;background:rgba(66,85,255,0.05);border:1px solid rgba(66,85,255,0.15);border-radius:var(--r4);padding:8px;margin-top:4px;flex-wrap:wrap;align-items:center;gap:4px}
.format-toolbar.show{display:flex}
.format-btn{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.6);border:1px solid rgba(180,170,210,0.3);cursor:pointer;border-radius:6px;font-size:13px;font-weight:700;transition:all .15s}
.format-btn:hover{background:rgba(255,255,255,0.9);border-color:rgba(66,85,255,0.5)}
.format-btn.active{background:#4255ff;color:#fff;border-color:#4255ff}
.color-palette{display:flex;gap:4px}
.color-swatch{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-swatch:hover{transform:scale(1.1);border-color:rgba(0,0,0,0.2)}
.color-swatch.active{border-color:#000;box-shadow:0 0 0 2px #fff,0 0 0 4px #4255ff}

/* Image upload */
.image-gallery{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.image-thumb{width:60px;height:60px;border-radius:6px;object-fit:cover;border:2px solid rgba(200,195,230,0.4);cursor:pointer;transition:all .15s}
.image-thumb:hover{border-color:#4255ff;transform:scale(1.05)}
.image-upload-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;background:rgba(66,85,255,0.1);border:1px dashed rgba(66,85,255,0.4);border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:#4255ff;transition:all .15s}
.image-upload-btn:hover{background:rgba(66,85,255,0.2);border-color:#4255ff}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(252,250,255,0.99);border:1px solid rgba(200,195,230,0.7);border-radius:var(--r);padding:12px 20px;font-size:14px;font-weight:700;box-shadow:0 8px 32px rgba(80,60,160,0.2);opacity:0;transform:translateY(12px);pointer-events:none;transition:all .25s var(--ease2);}
#toast.show{opacity:1;transform:translateY(0)}

/* Download banner */
.dl-banner{background:rgba(66,85,255,0.08);border:1px solid rgba(66,85,255,0.2);border-radius:var(--r);padding:14px 18px;margin-top:10px;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:10px}
.dl-banner code{background:rgba(66,85,255,0.1);padding:2px 8px;border-radius:6px;font-size:12px;color:#4255ff;font-family:monospace}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-hdr h3{font-size:20px;font-weight:800;letter-spacing:-0.3px}
.hidden{display:none!important}
.text-muted{color:var(--text2)}.text-sm{font-size:13px}.text-xs{font-size:11px}

@media(max-width:640px){
  nav{padding:0 16px}
  .screen{padding:16px}
  .home-hero h1{font-size:32px}
  .two-col{grid-template-columns:1fr}
  .pair-row{grid-template-columns:28px 1fr 26px;grid-template-rows:auto auto}
  .pair-row input:nth-child(3){grid-column:2}
}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">📚</div>
    StudyDeck
  </div>
  <div class="nav-actions">
    <button class="btn btn-primary btn-sm" onclick="showCreateModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nieuwe set
    </button>
  </div>
</nav>

<div class="screen page-enter">
  <div class="home-hero">
    <h1>Leer slimmer,<br><span>niet harder</span></h1>
    <p>Maak een set, deel de link, en oefen overal.</p>
    <div class="hero-btns">
      <button class="btn btn-primary btn-lg" onclick="showCreateModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nieuwe set
      </button>
    </div>
  </div>

  <div id="filter-bar" class="hidden" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center"></div>
  <div class="sets-grid" id="sets-grid"></div>
</div>

<!-- Modal -->
<div id="modal-bg" class="modal-bg hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-panel" id="modal-panel"></div>
</div>
<div id="toast"></div>

<script>
/* ══ OBFUSCATION KEY ══
   .vset files are base64-encoded JSON with a simple XOR pass.
   The key is split so it's not trivially readable in source.
*/
const _k=['S','t','u','d','y','D','e','c','k','V','S','e','t','2','0','2','5'];
const VSET_KEY=_k.join('');

function xorStr(str,key){
  return str.split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^key.charCodeAt(i%key.length))).join('');
}
function encodeVset(obj){
  const json=JSON.stringify(obj);
  const xored=xorStr(json,VSET_KEY);
  return btoa(unescape(encodeURIComponent(xored)));
}
function decodeVset(b64){
  const xored=decodeURIComponent(escape(atob(b64)));
  return JSON.parse(xorStr(xored,VSET_KEY));
}

/* ══ DB ══ */
let DB={sets:[]};
function initDB(){try{DB.sets=JSON.parse(localStorage.getItem('sd_sets')||'[]');}catch(e){DB.sets=[];}}
function saveDB(){try{localStorage.setItem('sd_sets',JSON.stringify(DB.sets));}catch(e){}}

/* ══ LOAD SETS FROM /sets/ DIRECTORY ══ */
async function loadSetsFromDirectory(){
  try{
    // Try to load sets list from sets/index.json
    const indexResp=await fetch('sets/index.json');
    if(indexResp.ok){
      const fileList=await indexResp.json();

      for(const filename of fileList){
        try{
          const sr=await fetch('sets/'+encodeURIComponent(filename));
          if(sr.ok){
            const content=await sr.text();
            let set=null;

            // Try to decode as .vset (base64 + XOR)
            try{set=decodeVset(content.trim());}
            catch{
              // Try plain JSON
              try{set=JSON.parse(content.trim());}
              catch(e){}
            }

            if(set&&set.title){
              // Check if already exists in DB
              const exists=DB.sets.find(x=>x.id===set.id||x.slug===set.slug);
              if(!exists){
                // Normalize and add
                if(!set.id)set.id='srv_'+Date.now();
                if(!set.slug)set.slug=toSlug(set.title);
                if(!set.terms)set.terms=[];
                set.fromServer=true; // Mark as server set - cannot be deleted
                DB.sets.push(set);
              }
            }
          }
        }catch(e){console.log('Error loading '+filename+': '+e.message)}
      }
    }
  }catch(e){console.log('Could not load sets/index.json:',e.message)}

  // Fallback: Try directory listing
  try{
    const resp=await fetch('sets/');
    if(!resp.ok)return;

    const text=await resp.text();
    const parser=new DOMParser();
    const doc=parser.parseFromString(text,'text/html');
    const links=doc.querySelectorAll('a[href*=".vset"]');

    for(const link of links){
      const filename=link.getAttribute('href');
      if(filename.endsWith('.vset')){
        try{
          const sr=await fetch('sets/'+encodeURIComponent(filename));
          if(sr.ok){
            const content=await sr.text();
            let set=null;
            try{set=decodeVset(content.trim());}
            catch{try{set=JSON.parse(content.trim());}catch(e){}}

            if(set&&set.title){
              const exists=DB.sets.find(x=>x.id===set.id||x.slug===set.slug);
              if(!exists){
                if(!set.id)set.id='srv_'+Date.now();
                if(!set.slug)set.slug=toSlug(set.title);
                if(!set.terms)set.terms=[];
                set.fromServer=true; // Mark as server set - cannot be deleted
                DB.sets.push(set);
              }
            }
          }
        }catch(e){}
      }
    }
  }catch(e){}
}

/* ══ RENDER ══ */
function renderHome(){
  const vakken=[...new Set(DB.sets.map(s=>s.vak).filter(Boolean))];
  const fb=document.getElementById('filter-bar');
  if(vakken.length){
    fb.classList.remove('hidden');
    fb.style.display='flex';
    fb.innerHTML=`<span style="font-size:13px;color:var(--text2);font-weight:700">Filter:</span>
      <button class="btn btn-glass btn-sm" onclick="renderGrid(DB.sets)" style="border-radius:20px">Alle</button>
      ${vakken.map(v=>`<button class="btn btn-glass btn-sm" onclick="renderGrid(DB.sets.filter(s=>s.vak==='${esc(v)}'))" style="border-radius:20px">${esc(v)}</button>`).join('')}`;
  }
  renderGrid(DB.sets);
}

function renderGrid(sets){
  const el=document.getElementById('sets-grid');
  if(!sets.length){
    el.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--text2);grid-column:1/-1">
      <div style="font-size:48px;margin-bottom:16px">📚</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:8px">Geen sets</div>
      <p>Maak een nieuwe set aan of importeer een .vset bestand.</p>
    </div>`;
    return;
  }
  el.innerHTML=sets.map(s=>`
    <div class="set-card" onclick="openSet('${s.id}')">
      <div class="set-card-title">${esc(s.title)}</div>
      <div class="set-card-desc">${esc(s.description||'')}</div>
      <div class="set-card-meta">
        <span class="badge badge-purple">${s.terms.length} begrippen</span>
        ${s.vak?`<span class="badge badge-orange">${esc(s.vak)}</span>`:''}
        ${s.datum?`<span style="font-size:11px;color:var(--text3)">${s.datum}</span>`:''}
      </div>
      <div class="set-card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-glass btn-sm" onclick="openSet('${s.id}')">Oefenen</button>
        ${!s.fromServer?`<button class="btn btn-glass btn-sm" onclick="showEditModal('${s.id}')">Bewerken</button>`:''}
        ${!s.fromServer?`<button class="btn btn-sm" style="background:rgba(232,58,74,0.1);color:var(--red);border:none;border-radius:8px;padding:6px 10px;font-family:var(--font);font-weight:700;cursor:pointer" onclick="confirmDelete('${s.id}')">✕</button>`:''}
      </div>
    </div>
  `).join('');
}

function openSet(id){
  const s=DB.sets.find(x=>x.id===id);
  if(!s)return;
  // Derive slug from title (or id)
  const slug=s.slug||toSlug(s.title);
  s.slug=slug;saveDB();
  window.location.href=`set.html?set=${encodeURIComponent(slug)}`;
}

function toSlug(str){
  return str.toLowerCase()
    .replace(/[àáâäãåā]/g,'a').replace(/[èéêëē]/g,'e').replace(/[ìíîïī]/g,'i')
    .replace(/[òóôöõøō]/g,'o').replace(/[ùúûüū]/g,'u').replace(/[ñ]/g,'n')
    .replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').replace(/-+/g,'-').slice(0,60)||'set-'+Date.now();
}

/* ══ DOWNLOAD .vset ══ */
// Removed: Download functionality moved to developer.html for commercial use


/* ══ CREATE MODAL ══ */
let CE={id:null,pairs:[],isMaximized:false};

function toggleMaximizeModal(){
  CE.isMaximized=!CE.isMaximized;
  const bg=document.getElementById('modal-bg');
  if(CE.isMaximized){
    bg.classList.add('modal-maximized');
  }else{
    bg.classList.remove('modal-maximized');
  }
}

function showCreateModal(id){
  CE.id=id||null;
  const s=id?DB.sets.find(x=>x.id===id):null;
  CE.pairs=s?s.terms.map(t=>{
    const term={...t};
    if(!term.termSegments&&(term.termColor||term.termBold||term.termItalic)){
      term.termSegments=[{text:term.term,color:term.termColor,bold:term.termBold,italic:term.termItalic}];
    }
    if(!term.defSegments&&(term.defColor||term.defBold||term.defItalic)){
      term.defSegments=[{text:term.def,color:term.defColor,bold:term.defBold,italic:term.defItalic}];
    }
    return term;
  }):[{term:'',def:''},{term:'',def:''}];

  if(!id){
    const draft=JSON.parse(localStorage.getItem('sd_draft')||'null');
    if(draft && draft.pairs){
      CE.pairs=draft.pairs;
      setTimeout(()=>showToast('📋 Concept hersteld!'),100);
      setTimeout(()=>localStorage.removeItem('sd_draft'),500);
    }
  }

  showModal(`
    <h3>
      <span>${id?'Set bewerken':'Nieuwe set'}</span>
      <div class="modal-header-actions">

/* ══ FORMATTING HELPERS ══ */
const PRESET_COLORS=['#000000','#FF4444','#4499FF','#44CC44','#FFA500','#9944FF','#FF1493'];

function renderSegments(segments,plain=false){
  if(!segments||!segments.length)return'';
  if(plain)return segments.map(s=>s.text).join('');
  return segments.map(s=>{
    if(!s.text)return'';
    const style=`${s.color?`color:${s.color};`:''}${s.bold?'font-weight:700;':''}${s.italic?'font-style:italic;':''}`;
    return style?`<span style="${style}">${esc(s.text)}</span>`:esc(s.text);
  }).join('');
}

function applyFormatting(text,start,end,prop,value){
  if(!text)return[];
  let segments=[{text:text}];
  if(start<0||end>text.length||start>=end)return segments;

  let pos=0,result=[];
  for(const seg of segments){
    const segEnd=pos+seg.text.length;
    if(segEnd<=start||pos>=end){
      result.push(seg);pos=segEnd;continue;
    }
    const inStart=Math.max(0,start-pos);
    const inEnd=Math.min(seg.text.length,end-pos);
    if(inStart>0)result.push({text:seg.text.slice(0,inStart),...seg});
    const midSeg={text:seg.text.slice(inStart,inEnd),...seg};
    midSeg[prop]=value;
    result.push(midSeg);
    if(inEnd<seg.text.length)result.push({text:seg.text.slice(inEnd),...seg});
    pos=segEnd;
  }
  return result;
}

function ceUploadImage(idx,type){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file){showToast('Geen bestand geselecteerd');return;}
    if(file.size>500000){showToast('Afbeelding te groot (max 500KB)');return;}
    const reader=new FileReader();
    reader.onload=evt=>{
      const b64=evt.target.result.split(',')[1];
      const pair=CE.pairs[idx];
      if(!pair.images)pair.images=[];
      pair.images.push({id:'img_'+Date.now(),base64:b64});
      if(pair.images.length>3){showToast('Max 3 afbeeldingen per begrip');pair.images.pop();return;}
      ceRenderPairs();
      showToast('Afbeelding toegevoegd!');
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function ceRemoveImage(idx,imgIdx){
  const pair=CE.pairs[idx];
  if(pair.images){
    pair.images.splice(imgIdx,1);
    ceRenderPairs();
    showToast('Afbeelding verwijderd');
  }
}

function ceRenderPairs(){
  const el=document.getElementById('ce-pairs');
  if(!el)return;
  const activeInputId=document.activeElement?.id;
  el.innerHTML=CE.pairs.map((p,i)=>{
    const termPreview=p.activeTermBold||p.activeTermItalic||p.activeTermColor?`<span style="font-size:11px;padding:4px 8px;background:rgba(66,85,255,0.08);border-radius:4px;margin-top:4px;display:inline-block;color:#4255ff">${p.activeTermBold?'<b>B</b>':''} ${p.activeTermItalic?'<i>I</i>':''} ${p.activeTermColor?'●':''}</span>`:'';
    const defPreview=p.activeDefBold||p.activeDefItalic||p.activeDefColor?`<span style="font-size:11px;padding:4px 8px;background:rgba(66,85,255,0.08);border-radius:4px;margin-top:4px;display:inline-block;color:#4255ff">${p.activeDefBold?'<b>B</b>':''} ${p.activeDefItalic?'<i>I</i>':''} ${p.activeDefColor?'●':''}</span>`:'';
    return`
    <div class="pair-row" style="flex-wrap:wrap">
      <div class="pair-num">${i+1}</div>
      <div style="display:flex;flex-direction:column;gap:4px;grid-column:2">
        <input type="text" id="ce-term-${i}" placeholder="Begrip" value="${esc(p.term)}"
          oninput="ceHandleInput(${i},'term',this.value)"
          onfocus="document.getElementById('fmt-term-${i}').classList.add('show')"
          onblur="document.getElementById('fmt-term-${i}').classList.remove('show')"
          style="min-width:100%">
        ${termPreview}
        <div class="format-toolbar" id="fmt-term-${i}" style="gap:4px">
          <div class="color-palette">${PRESET_COLORS.map(c=>`
            <div class="color-swatch ${p.activeTermColor===c?'active':''}" style="background:${c}" onmousedown="event.preventDefault();ceToggleColor(${i},'term','${c}');document.getElementById('ce-term-${i}').focus()" title="Kleur"></div>
          `).join('')}</div>
          <button class="format-btn ${p.activeTermBold?'active':''}" onmousedown="event.preventDefault();ceToggleBold(${i},'term');document.getElementById('ce-term-${i}').focus()" title="Vet (Ctrl+B)">B</button>
          <button class="format-btn ${p.activeTermItalic?'active':''}" onmousedown="event.preventDefault();ceToggleItalic(${i},'term');document.getElementById('ce-term-${i}').focus()" title="Cursief (Ctrl+I)">I</button>
          <button class="image-upload-btn" style="margin-left:auto" onmousedown="event.preventDefault();ceUploadImage(${i},'term');document.getElementById('ce-term-${i}').focus()">🖼️ Afb.</button>
        </div>
        ${p.images&&p.images.length?`<div class="image-gallery">${p.images.map((img,j)=>`<img src="data:image/png;base64,${img.base64}" class="image-thumb" onclick="ceRemoveImage(${i},${j})" title="Klik om te verwijderen">`).join('')}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;grid-column:3">
        <input type="text" id="ce-def-${i}" placeholder="Definitie" value="${esc(p.def)}"
          oninput="ceHandleInput(${i},'def',this.value)"
          onfocus="document.getElementById('fmt-def-${i}').classList.add('show')"
          onblur="document.getElementById('fmt-def-${i}').classList.remove('show')"
          style="min-width:100%">
        ${defPreview}
        <div class="format-toolbar" id="fmt-def-${i}" style="gap:4px">
          <div class="color-palette">${PRESET_COLORS.map(c=>`
            <div class="color-swatch ${p.activeDefColor===c?'active':''}" style="background:${c}" onmousedown="event.preventDefault();ceToggleColor(${i},'def','${c}');document.getElementById('ce-def-${i}').focus()" title="Kleur"></div>
          `).join('')}</div>
          <button class="format-btn ${p.activeDefBold?'active':''}" onmousedown="event.preventDefault();ceToggleBold(${i},'def');document.getElementById('ce-def-${i}').focus()" title="Vet (Ctrl+B)">B</button>
          <button class="format-btn ${p.activeDefItalic?'active':''}" onmousedown="event.preventDefault();ceToggleItalic(${i},'def');document.getElementById('ce-def-${i}').focus()" title="Cursief (Ctrl+I)">I</button>
          <button class="image-upload-btn" style="margin-left:auto" onmousedown="event.preventDefault();ceUploadImage(${i},'def');document.getElementById('ce-def-${i}').focus()">🖼️ Afb.</button>
        </div>
        ${p.images&&p.images.length?`<div class="image-gallery">${p.images.map((img,j)=>`<img src="data:image/png;base64,${img.base64}" class="image-thumb" onclick="ceRemoveImage(${i},${j})" title="Klik om te verwijderen">`).join('')}</div>`:''}
      </div>
      <button class="pair-del" onclick="ceRemove(${i})">×</button>
    </div>
  `}).join('');
  if(activeInputId) setTimeout(()=>{const el=document.getElementById(activeInputId); if(el) el.focus();},0);
}

function ceHandleInput(idx,type,newText){
  const pair=CE.pairs[idx];
  const oldText=type==='term'?pair.term:pair.def;

  // Update text
  if(type==='term')pair.term=newText;
  else pair.def=newText;

  // Find what was added (simple approach: track last char)
  if(newText.length>oldText.length){
    const addedText=newText.slice(oldText.length);
    const activeColor=type==='term'?pair.activeTermColor:pair.activeDefColor;
    const activeBold=type==='term'?pair.activeTermBold:pair.activeDefBold;
    const activeItalic=type==='term'?pair.activeTermItalic:pair.activeDefItalic;

    console.log(`[ceHandleInput] ${type}[${idx}] - Bold:${activeBold} Italic:${activeItalic} Color:${activeColor}`);

    if(activeColor||activeBold||activeItalic){
      const segFieldKey=type==='term'?'termSegments':'defSegments';
      let segments=pair[segFieldKey]||[{text:oldText}];

      // Add new segment with formatting
      segments.push({
        text: addedText,
        color: activeColor||undefined,
        bold: activeBold||false,
        italic: activeItalic||false
      });
      pair[segFieldKey]=segments;
      console.log(`[ceHandleInput] Created segments for ${segFieldKey}:`, segments);
    } else {
      // Clear segments if no active formatting
      if(type==='term')delete pair.termSegments;
      else delete pair.defSegments;
    }
  }
}

function ceToggleColor(idx,type,color){
  const pair=CE.pairs[idx];
  const activeKey=type==='term'?'activeTermColor':'activeDefColor';
  if(pair[activeKey]===color){
    pair[activeKey]=null;
  } else {
    pair[activeKey]=color;
  }
  ceRenderPairs();
  showToast(pair[activeKey]?'🎨 Kleur ingeschakeld':'🎨 Kleur uitgeschakeld');
}

function ceToggleBold(idx,type){
  const pair=CE.pairs[idx];
  const activeKey=type==='term'?'activeTermBold':'activeDefBold';
  pair[activeKey]=!pair[activeKey];
  ceRenderPairs();
  showToast(pair[activeKey]?'<b>Vet ingeschakeld</b>':'<b>Vet uitgeschakeld</b>');
}

function ceToggleItalic(idx,type){
  const pair=CE.pairs[idx];
  const activeKey=type==='term'?'activeTermItalic':'activeDefItalic';
  pair[activeKey]=!pair[activeKey];
  ceRenderPairs();
  showToast(pair[activeKey]?'<i>Cursief ingeschakeld</i>':'<i>Cursief uitgeschakeld</i>');
}
function ceAdd(){
  CE.pairs.push({
    term:'',def:'',
    activeTermColor:null,activeTermBold:false,activeTermItalic:false,
    activeDefColor:null,activeDefBold:false,activeDefItalic:false
  });
  ceRenderPairs();
  setTimeout(()=>{const rows=document.querySelectorAll('#ce-pairs .pair-row');rows[rows.length-1]?.querySelector('input')?.focus();},50);
}

function ceRemove(i){if(CE.pairs.length<=1){showToast('Minimaal 1 begrip vereist');return;}CE.pairs.splice(i,1);ceRenderPairs();}

// Keyboard shortcuts for formatting (Ctrl+B, Ctrl+I)
document.addEventListener('keydown', e => {
  if(!CE.pairs) return; // Niet in edit mode
  const input = document.activeElement;
  if(input?.tagName !== 'INPUT' || !input?.id?.startsWith('ce-')) return;

  // Parse input id: ce-term-0 or ce-def-0
  const match = input.id.match(/^ce-(term|def)-(\d+)$/);
  if(!match) return;

  const [, type, idx] = match;
  const i = parseInt(idx);

  if(e.ctrlKey || e.metaKey) { // Ctrl on Windows/Linux, Cmd on Mac
    if(e.key === 'b' || e.key === 'B') {
      e.preventDefault();
      ceToggleBold(i, type);
      input.focus(); // Keep focus
    }
    else if(e.key === 'i' || e.key === 'I') {
      e.preventDefault();
      ceToggleItalic(i, type);
      input.focus();
    }
  }
});

function ceSave(){
  const title=document.getElementById('c-title').value.trim();
  if(!title){showToast('Vul een titel in');return;}

  const terms=CE.pairs.filter(p=>p.term.trim()||p.def.trim()).map(p=>{
    const t={term:p.term.trim(),def:p.def.trim()};
    // Preserve formatting segments if they exist
    if(p.termSegments)t.termSegments=p.termSegments;
    if(p.defSegments)t.defSegments=p.defSegments;
    if(p.images)t.images=p.images;
    return t;
  });

  if(!terms.length){
    showToast('⚠️ Voeg minimaal 1 begrip toe (links EN rechts invullen)');
    return;
  }

  const existing=CE.id?DB.sets.find(x=>x.id===CE.id):null;
  const slug=existing?.slug||toSlug(title);
  const set={
    id:CE.id||'set_'+Date.now(),
    slug,title,
    description:document.getElementById('c-desc').value.trim(),
    vak:document.getElementById('c-vak').value.trim(),
    datum:document.getElementById('c-datum').value,
    terms
  };

  if(CE.id){
    const idx=DB.sets.findIndex(x=>x.id===CE.id);
    if(idx>-1)DB.sets[idx]=set;
  }else{
    DB.sets.unshift(set);
  }

  saveDB();
  localStorage.removeItem('sd_draft'); // Clear draft on save
  closeModal();
  renderHome();
  showToast(CE.id?'✓ Set opgeslagen!':'✓ Set aangemaakt! ('+ set.id +')');
}

function ceSaveDraft(){
  if(!CE.pairs)return;
  const draft={
    pairs: JSON.parse(JSON.stringify(CE.pairs)), // Deep copy
    title: document.getElementById('c-title')?.value||'',
    vak: document.getElementById('c-vak')?.value||'',
    desc: document.getElementById('c-desc')?.value||'',
    datum: document.getElementById('c-datum')?.value||''
  };
  localStorage.setItem('sd_draft', JSON.stringify(draft));
}

function confirmDelete(id){
  const s=DB.sets.find(x=>x.id===id);
  if(!s)return;
  if(s.fromServer){showToast('Deze set is van de server - kan niet verwijderd worden');return;}
  showModal(`
    <h3>Set verwijderen?</h3>
    <p style="color:var(--text2);margin-bottom:20px">Dit kan niet ongedaan worden gemaakt.</p>
    <div class="modal-footer">
      <button class="btn btn-glass" onclick="closeModal()">Annuleren</button>
      <button class="btn" style="background:var(--red);color:#fff;border:none;border-radius:var(--r3);padding:9px 18px;font-family:var(--font);font-weight:700;cursor:pointer" onclick="doDelete('${id}')">Verwijderen</button>
    </div>
  `);
}
function doDelete(id){DB.sets=DB.sets.filter(s=>s.id!==id);saveDB();closeModal();renderHome();showToast('Set verwijderd')}

/* ══ MODAL ══ */
function showModal(html){document.getElementById('modal-panel').innerHTML=html;document.getElementById('modal-bg').classList.remove('hidden');}
function closeModal(){
  CE.isMaximized=false;
  document.getElementById('modal-bg').classList.add('hidden');
  document.getElementById('modal-bg').classList.remove('modal-maximized');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ══ TOAST ══ */
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2800);}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

initDB();
loadSetsFromDirectory().then(()=>renderHome());
